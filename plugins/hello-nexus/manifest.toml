[plugin]
id = "com.nexus.hello"
name = "Hello Nexus"
version = "0.1.0"
trust_level = "community"
api_version = "1"

[wasm]
module = "hello.wasm"
memory_mb = 8
fuel = 1_000_000

[[registrations.ui_command]]
id = "hello.sayHi"
handler_id = 100
title = "Hello: Say hi"
category = "Demo"
icon = "hand"
keybinding = "Mod+Shift+H"

[[registrations.ui_panel]]
id = "hello.panel"
handler_id = 101
title = "Hello Nexus"
icon = "hand"
side = "right"

[[registrations.ui_settings_tab]]
id = "hello.about"
handler_id = 102
title = "Hello Nexus"
icon = "hand"

[lifecycle]
on_init = true
