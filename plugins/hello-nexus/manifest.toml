[plugin]
id = "com.nexus.hello"
name = "Hello Nexus"
version = "0.1.0"
trust_level = "community"
api_version = "1"

[capabilities]
# Handler 104 emits com.nexus.hello.observed back to the frontend.
required = ["events.publish"]
# sayHi and other handlers surface toasts via host::notify.
optional = ["ui.notify"]

[wasm]
module = "hello.wasm"
memory_mb = 8
fuel = 1_000_000

[settings]
schema = "settings.schema.json"

[[registrations.ui_command]]
id = "hello.sayHi"
handler_id = 103
title = "Hello: Say hi"
category = "Demo"
icon = "hand"
keybinding = "Mod+Shift+H"

[[registrations.ui_command]]
id = "hello.echoSettings"
handler_id = 105
title = "Hello: Echo settings"
category = "Demo"
icon = "sliders-horizontal"

[[registrations.ui_panel]]
id = "hello.panel"
handler_id = 101
title = "Hello Nexus"
icon = "hand"
# The right panel is the document Inspector (outline / backlinks /
# graph). Demo panels live on the left so they're reachable via the
# rail without crowding the Inspector tab row.
side = "left"

[[registrations.ui_settings_tab]]
id = "hello.about"
handler_id = 102
title = "Hello Nexus"
icon = "hand"

[[registrations.ui_ribbon_item]]
id = "hello.ribbon"
icon = "hand"
tooltip = "Hello: Say hi"
command = "hello.sayHi"

[[registrations.ui_status_item]]
id = "hello.status"
icon = "hand"
text = "Hi!"
tooltip = "Click to greet"
command = "hello.sayHi"

# Subscribe to every host-origin lifecycle event — forge switches,
# file opens, theme changes, etc. Handler 104 receives the event JSON
# and surfaces a `com.nexus.hello.observed` plugin event back to the
# frontend so you can see the round-trip in DevTools.
[[registrations.event_subscriber]]
id = "hello.onHostEvent"
filter = "nexus.host.*"
handler_id = 104

[lifecycle]
on_init = true
