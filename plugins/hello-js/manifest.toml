[plugin]
id = "com.nexus.hello-js"
name = "Hello JS"
version = "0.1.0"
trust_level = "community"
api_version = "1"

[script]
module = "plugin.js"

[[registrations.ui_command]]
id = "hello-js.sayHi"
handler_id = 1
title = "Hello JS: Say hi"
category = "Demo"
icon = "sparkles"

[[registrations.ui_command]]
id = "hello-js.greet"
handler_id = 2
title = "Hello JS: Greet with settings"
category = "Demo"
icon = "message-circle"

[[registrations.slash_command]]
id = "hello-js.greet-block"
label = "Hello greeting block"
description = "Insert a hello-world callout"
aliases = ["greet", "hi"]
badge = "👋"
template = "> 👋 Hello from a JS plugin!\n> \u0000"

[lifecycle]
on_init = true
