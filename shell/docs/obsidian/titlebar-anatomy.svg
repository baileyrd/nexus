<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" width="960" height="820">
  <defs>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; font-weight: 500; fill: #6b7280; }
    .section { font-size: 12px; font-weight: 700; fill: #2563eb; letter-spacing: 1.3px; }
    .node-title { font-size: 14px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 11px; font-weight: 500; fill: #6b7280; }
    .node-type { font-size: 10px; font-weight: 700; fill: #9ca3af; letter-spacing: 0.08em; }
    .mono-dim { font-family: Menlo, Consolas, monospace; font-size: 10px; fill: #7c3aed; }
    .legend { font-size: 11px; font-weight: 500; fill: #6b7280; }
    </style>
  </defs>
  <rect width="960" height="820" fill="#ffffff"/>
  <text x="40" y="44" class="title">Titlebar Anatomy &amp; Drag Regions</text>
  <text x="40" y="64" class="subtitle">Three rendering modes · where min/max/close physically live · which pixels are -webkit-app-region: drag</text>

  <!-- Mode A: native frame -->
  <text x="40" y="100" class="section">MODE A · FRAME=NATIVE (frame: true, OS chrome owns the top)</text>
  <text x="40" y="116" class="node-sub">Default on Windows/Linux · OS titlebar sits above the webview · .titlebar CSS rule matches but has height 0 (not frameless)</text>
  <rect x="40" y="124" width="880" height="28" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="480" y="142" text-anchor="middle" class="node-sub">OS-native title bar (outside webview) — Vault.md — Obsidian    [ — ] [ □ ] [ × ]</text>
  <rect x="40" y="154" width="880" height="36" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.6"/>
  <text x="54" y="176" class="node-type">.workspace-tab-header-container   height: 40px · --header-height</text>
  <text x="720" y="176" class="mono-dim">no frame-space padding</text>

  <!-- Mode B: is-frameless (visible titlebar at 30px) -->
  <text x="40" y="222" class="section">MODE B · IS-FRAMELESS (custom titlebar at --titlebar-height = 30px)</text>
  <text x="40" y="238" class="node-sub">body.is-frameless:not(.is-hidden-frameless, .is-fullscreen) — app.css:3979-3982 · body padding-top: 30px (3976)</text>
  <rect x="40" y="246" width="880" height="30" rx="4" fill="#f1f5f9" stroke="#2563eb" stroke-width="1.6"/>
  <text x="60" y="265" class="node-type">.titlebar   30px</text>
  <text x="220" y="265" class="node-sub">-webkit-app-region: drag  (css:5608)</text>
  <text x="500" y="265" class="node-sub">.titlebar-text centered · padding 0 125px</text>
  <rect x="858" y="250" width="56" height="22" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="886" y="264" text-anchor="middle" class="mono-dim">— □ ×</text>
  <rect x="40" y="278" width="880" height="36" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.4"/>
  <text x="54" y="300" class="node-type">.workspace-tab-header-container   40px</text>
  <text x="720" y="300" class="mono-dim">css:6092-6101</text>

  <!-- Mode C: is-hidden-frameless (windows/linux) -->
  <text x="40" y="348" class="section">MODE C · IS-HIDDEN-FRAMELESS · WINDOWS / LINUX (titlebar collapses into the tab row)</text>
  <text x="40" y="364" class="node-sub">.titlebar height calc(--header-height - 1px) = 39px but transparent, pointer-events:none (css:5704-5710). Tab row hosts controls.</text>

  <rect x="40" y="374" width="880" height="54" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="54" y="392" class="node-type">.workspace-tab-header-container  (rightmost split · .mod-top-right-space)</text>
  <!-- left drag region -->
  <rect x="46" y="400" width="16" height="22" rx="2" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="54" y="416" text-anchor="middle" class="mono-dim" fill="#6d28d9">L</text>
  <!-- inner tab list, dragable -->
  <rect x="66" y="400" width="660" height="22" rx="3" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="396" y="416" text-anchor="middle" class="node-sub">.workspace-tab-header-container-inner  —  drag (css:6105-6112)</text>
  <!-- right frame-right-space (no-drag) -->
  <rect x="730" y="400" width="118" height="22" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="789" y="416" text-anchor="middle" class="mono-dim" fill="#b45309">--frame-right-space 126px (no-drag)</text>
  <!-- min/max/close -->
  <rect x="852" y="400" width="62" height="22" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1.2"/>
  <text x="883" y="416" text-anchor="middle" class="mono-dim" fill="#92400e">— □ ×</text>
  <text x="54" y="448" class="node-sub">.titlebar-button-container.mod-right nests inside this header row (css:5675, 4061-4065).</text>
  <text x="54" y="462" class="mono-dim">::before on mod-top-left-space reserves --frame-left-space (no-drag) — left of tab list (css:4043-4051)</text>

  <!-- Mode D: macOS hidden-frameless -->
  <text x="40" y="496" class="section">MODE D · IS-HIDDEN-FRAMELESS · MACOS (traffic lights native, right-toggle fixed)</text>
  <text x="40" y="512" class="node-sub">.titlebar display:none (css:5701-5703). Traffic lights are OS-native at 80px offset. Right sidebar-toggle position:fixed in corner.</text>

  <rect x="40" y="522" width="880" height="54" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.8"/>
  <text x="54" y="540" class="node-type">.workspace-tab-header-container  (root · .mod-top-left-space)</text>
  <!-- traffic lights no-drag reserved -->
  <rect x="46" y="548" width="72" height="22" rx="3" fill="#fecaca" stroke="#b91c1c" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="82" y="564" text-anchor="middle" class="mono-dim" fill="#991b1b">● ● ●  traffic lights (OS)</text>
  <!-- drag middle -->
  <rect x="122" y="548" width="756" height="22" rx="3" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="500" y="564" text-anchor="middle" class="node-sub">tab-header-container-inner · drag · +--frame-left-space (36px) padding-left (css:4037-4038)</text>
  <!-- fixed right toggle -->
  <rect x="882" y="522" width="32" height="32" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1.4"/>
  <text x="898" y="542" text-anchor="middle" class="mono-dim" fill="#92400e">⇥</text>
  <text x="54" y="596" class="mono-dim">.mod-macos.is-hidden-frameless:not(.is-popout-window) .sidebar-toggle-button.mod-right  →  fixed top:0 right:0 (css:6621-6628)</text>
  <text x="54" y="612" class="mono-dim">additional padding-right: 38px on .mod-top-right-space .workspace-tab-header-container (css:6629-6630)</text>

  <!-- Control nesting diagram -->
  <text x="40" y="654" class="section">WHERE THE WINDOW CONTROLS PHYSICALLY LIVE</text>
  <rect x="40" y="666" width="880" height="108" rx="8" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6 5"/>
  <rect x="56" y="682" width="270" height="84" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.4"/>
  <text x="72" y="702" class="node-type">MODE B · IS-FRAMELESS</text>
  <text x="72" y="720" class="node-title">.titlebar</text>
  <text x="72" y="738" class="node-sub">└ .titlebar-button-container.mod-right</text>
  <text x="72" y="754" class="node-sub">    └ min · max · close</text>

  <rect x="346" y="682" width="270" height="84" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4"/>
  <text x="362" y="702" class="node-type">MODE C · WIN/LINUX HIDDEN</text>
  <text x="362" y="720" class="node-title">.workspace-tab-header-container</text>
  <text x="362" y="738" class="node-sub">└ .titlebar-button-container.mod-right</text>
  <text x="362" y="754" class="node-sub">    bg: --titlebar-background (css:4061)</text>

  <rect x="636" y="682" width="270" height="84" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.4"/>
  <text x="652" y="702" class="node-type">MODE D · MACOS HIDDEN</text>
  <text x="652" y="720" class="node-title">OS traffic lights (native)</text>
  <text x="652" y="738" class="node-sub">+ fixed .sidebar-toggle-button.mod-right</text>
  <text x="652" y="754" class="node-sub">    position:fixed top:0 right:0</text>

  <!-- Legend -->
  <rect x="40" y="786" width="880" height="22" rx="5" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="52" y="792" width="14" height="10" fill="#eef2ff" stroke="#6366f1"/><text x="72" y="802" class="legend">drag region</text>
  <rect x="162" y="792" width="14" height="10" fill="#fef3c7" stroke="#b45309" stroke-dasharray="3 2"/><text x="182" y="802" class="legend">reserved no-drag (frame-space)</text>
  <rect x="372" y="792" width="14" height="10" fill="#fde68a" stroke="#d97706"/><text x="392" y="802" class="legend">window control buttons</text>
  <rect x="540" y="792" width="14" height="10" fill="#fecaca" stroke="#b91c1c" stroke-dasharray="3 2"/><text x="560" y="802" class="legend">OS-owned (traffic lights)</text>
</svg>
