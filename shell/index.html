<!DOCTYPE html>
<html lang="en" data-theme="dark" data-density="cozy">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Design tokens live here (not in shell.css) because the webview
         reliably parses :root custom properties from inline <style>
         blocks in the initial HTML document, whereas Vite's JS-injected
         stylesheet can end up with its :root block not registering on
         documentElement in some browsers/tauri configurations. This
         guarantees var(--bg) / var(--fg) / var(--accent) etc. resolve
         before the React tree mounts. */
      :root {
        --bg:          oklch(0.185 0.008 260);
        --bg-raised:   oklch(0.215 0.008 260);
        --bg-soft:     oklch(0.235 0.009 60);
        --bg-hover:    oklch(0.27  0.01  260);
        --bg-active:   oklch(0.32  0.012 260);
        --line:        oklch(0.30  0.008 260);
        --line-soft:   oklch(0.26  0.008 260);
        --fg:          oklch(0.94  0.005 80);
        --fg-muted:    oklch(0.72  0.008 80);
        --fg-dim:      oklch(0.55  0.008 80);
        --accent:      oklch(0.78  0.14  70);
        --accent-soft: oklch(0.78  0.14  70 / 0.16);
        --accent-ink:  oklch(0.22  0.05  70);
        --ok:          oklch(0.78  0.12  165);
        --warn:        oklch(0.82  0.14  85);
        --risk:        oklch(0.72  0.17  25);
        --cool:        oklch(0.76  0.09  230);

        --f-ui:   'Inter', system-ui, -apple-system, sans-serif;
        --f-body: 'IBM Plex Serif', Georgia, serif;
        --f-mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace;

        --r:    6px;
        --r-lg: 10px;
        --shadow: 0 1px 0 oklch(1 0 0 / 0.03) inset, 0 10px 30px oklch(0 0 0 / 0.35);

        /* Legacy token compat shim — removed once every plugin uses Forge names. */
        --shell-bg:       var(--bg);
        --shell-fg:       var(--fg);
        --titlebar-bg:    var(--bg-raised);
        --activitybar-bg: var(--bg-raised);
        --sidebar-bg:     var(--bg-raised);
        --editor-bg:      var(--bg);
        --panel-bg:       var(--bg-raised);
        --statusbar-bg:   var(--bg-raised);
        --statusbar-fg:   var(--fg-muted);
        --border:         var(--line);
        --list-hover:     var(--bg-hover);
        --list-active:    var(--bg-active);
        --input-bg:       var(--bg);
        --font-ui:        var(--f-ui);
        --font-mono:      var(--f-mono);
      }

      [data-theme="light"] {
        --bg:          oklch(0.985 0.004 80);
        --bg-raised:   oklch(0.965 0.004 80);
        --bg-soft:     oklch(0.975 0.008 80);
        --bg-hover:    oklch(0.945 0.004 80);
        --bg-active:   oklch(0.92  0.006 80);
        --line:        oklch(0.88  0.005 80);
        --line-soft:   oklch(0.92  0.005 80);
        --fg:          oklch(0.22  0.012 260);
        --fg-muted:    oklch(0.42  0.012 260);
        --fg-dim:      oklch(0.58  0.012 260);
        --accent:      oklch(0.62  0.15  45);
        --accent-soft: oklch(0.62  0.15  45 / 0.14);
        --accent-ink:  oklch(0.98  0.01  60);
        --shadow: 0 1px 0 oklch(0 0 0 / 0.03) inset, 0 10px 30px oklch(0 0 0 / 0.06);
      }

      :root,
      [data-density="cozy"] { --ui-size: 13px; --row-h: 26px; --body-size: 16px; }
      [data-density="compact"] { --ui-size: 12px; --row-h: 22px; --body-size: 15px; }
      [data-density="spacious"] { --ui-size: 14px; --row-h: 30px; --body-size: 17px; }

      /* Prevent white flash before the React tree mounts. */
      html, body { margin: 0; padding: 0; background: var(--bg); height: 100%; overflow: hidden; }
      #root { height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
