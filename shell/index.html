<!DOCTYPE html>
<html lang="en" data-density="cozy">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shell</title>
    <!-- SH-010: Self-hosted fonts. woff2 files live in public/fonts/.
         See shell/public/fonts/README.md for the download instructions.
         The @font-face declarations below reference /fonts/* which Vite
         copies from public/ to dist/ verbatim. Using font-display:swap
         so the system stack renders immediately while the custom fonts
         load, matching what the Google Fonts stylesheet did. -->
    <style>
      @font-face { font-family: 'Inter'; src: url('/fonts/Inter-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
      @font-face { font-family: 'Inter'; src: url('/fonts/Inter-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
      @font-face { font-family: 'Inter'; src: url('/fonts/Inter-SemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
      @font-face { font-family: 'Inter'; src: url('/fonts/Inter-Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }

      @font-face { font-family: 'IBM Plex Serif'; src: url('/fonts/IBMPlexSerif-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
      @font-face { font-family: 'IBM Plex Serif'; src: url('/fonts/IBMPlexSerif-Italic.woff2') format('woff2'); font-weight: 400; font-style: italic; font-display: swap; }
      @font-face { font-family: 'IBM Plex Serif'; src: url('/fonts/IBMPlexSerif-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
      @font-face { font-family: 'IBM Plex Serif'; src: url('/fonts/IBMPlexSerif-SemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }

      @font-face { font-family: 'JetBrains Mono'; src: url('/fonts/JetBrainsMono-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
      @font-face { font-family: 'JetBrains Mono'; src: url('/fonts/JetBrainsMono-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    </style>
    <style>
      /* Design tokens live here (not in shell.css) because the webview
         reliably parses :root custom properties from inline <style>
         blocks in the initial HTML document, whereas Vite's JS-injected
         stylesheet can end up with its :root block not registering on
         documentElement in some browsers/tauri configurations. This
         guarantees tokens resolve before the React tree mounts.

         The kernel `com.nexus.theme` plugin is the single source of
         truth for color tokens. Themes ship `--nx-*` variables (see
         crates/nexus-theme/themes/*); the block below bridges them
         into the consumer token names shell.css and plugin .tsx
         inline styles use. The hex fallbacks match the old hardcoded
         dark palette so we don't FOUC if the kernel is slow to
         hydrate. The previous [data-theme="light"] block has been
         removed — picking a theme in Settings > Appearance is now the
         only way to switch palettes. */
      :root {
        /* ── Bridge: kernel --nx-* → consumer token names ─────────── */
        --background-primary:            var(--nx-bg-primary, #1a1a1a);
        --background-secondary:          var(--nx-bg-secondary, #242424);
        --background-secondary-alt:      var(--nx-bg-tertiary, #2f2f2f);
        --background-modifier-hover:     var(--nx-interactive-hover, rgba(255, 255, 255, 0.067));
        --background-modifier-active:    var(--nx-interactive-active, rgba(255, 255, 255, 0.12));
        --background-modifier-border:    var(--nx-border, rgba(255, 255, 255, 0.10));

        --text-normal:                   var(--nx-text-primary, #f5f5f5);
        --text-muted:                    var(--nx-text-tertiary, #a0a0a0);
        --text-faint:                    var(--nx-text-muted, #737373);

        --interactive-accent:            var(--nx-color-primary, #6ba3ff);
        --interactive-accent-soft:       var(--nx-color-primary-soft, rgba(107, 163, 255, 0.16));
        --interactive-accent-ink:        var(--nx-text-inverted, #0f0f0f);

        /* ── Semantic status colors (Forge palette — Obsidian has no
              direct equivalents; kept under their original names per
              design-bundle feedback) ─────────────────────────────── */
        --ok:                            oklch(0.78  0.12  165);
        --ok-soft:                       oklch(0.78  0.12  165 / 0.14);
        --warn:                          oklch(0.82  0.14  85);
        --warn-soft:                     oklch(0.82  0.14  85 / 0.14);
        --risk:                          oklch(0.72  0.17  25);
        --risk-soft:                     oklch(0.72  0.17  25 / 0.14);
        --cool:                          oklch(0.76  0.09  230);

        /* ── Token bridges: map plugin-local names to the canonical set.
              These let ExtensionsTab, SettingsPanelView, IndexingStatus,
              and the AI suggestion rail reference stable names without
              falling back to hard-coded hex values (SH-013). ───────── */
        --err:                           var(--risk);
        --color-warning:                 var(--warn);
        --color-warning-bg:              var(--warn-soft);
        --nexus-color-success:           var(--ok);
        --nexus-color-danger:            var(--risk);
        --nexus-color-info:              var(--interactive-accent);
        --nexus-color-muted:             var(--text-muted);
        --nexus-color-border:            var(--background-modifier-border);
        --nexus-color-border-subtle:     var(--background-modifier-border);
        --ai-accent:                     var(--interactive-accent);
        --ai-accent-rephrase:            var(--interactive-accent);
        --ai-accent-tighten:             var(--cool);
        --ai-accent-warning:             var(--warn);
        --accent-muted:                  var(--interactive-accent);
        --accent-danger:                 var(--risk);
        --accent-fg:                     var(--interactive-accent-ink);
        --bg-danger-soft:                var(--risk-soft);
        --bg-muted:                      var(--background-secondary-alt);
        --danger:                        var(--risk);

        /* ── Typography tokens ────────────────────────────────────── */
        --font-interface: 'Inter', system-ui, -apple-system, sans-serif;
        --font-text:      'IBM Plex Serif', Georgia, serif;
        --font-monospace: 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace;

        --font-ui-smaller: 11px;
        --font-ui-small:   12px;
        --font-ui-medium:  13px;
        --font-ui-large:   15px;
        --font-bold:   600;
        --font-normal: 400;

        /* ── Radius scale ─────────────────────────────────────────── */
        --radius-s: 4px;
        --radius-m: 6px;
        --radius-l: 10px;

        /* ── Spacing scale (Obsidian's 4-n / 2-n series) ──────────── */
        --size-2-1: 2px;
        --size-2-2: 4px;
        --size-2-3: 6px;
        --size-4-1: 4px;
        --size-4-2: 8px;
        --size-4-3: 12px;
        --size-4-4: 16px;
        --size-4-5: 20px;
        --size-4-6: 24px;

        /* ── Z-index scale (mirrors shell/src/shell/zIndex.ts) ──────── */
        --z-chrome-controls:   100;
        --z-dropdown:          200;
        --z-overlay-floating:  900;
        --z-overlay-modal:    1100;
        --z-overlay-toast:    1200;
        --z-overlay-fatal:    9999;

        /* ── Chrome dimensions ────────────────────────────────────── */
        --header-height: 30px;

        /* ── Dividers / tab outlines ──────────────────────────────── */
        --divider-width: 1px;
        --divider-color: var(--background-modifier-border);
        --tab-outline-width: 1px;
        --tab-outline-color: var(--background-modifier-border);

        /* ── Region-derived tokens ────────────────────────────────── */
        --tab-container-background:      var(--background-secondary);
        --titlebar-background:           var(--background-secondary);
        --titlebar-background-focused:   var(--background-secondary-alt);
        --titlebar-text-color:           var(--text-muted);
        --titlebar-text-color-focused:   var(--text-normal);
        --file-header-background:        var(--background-primary);
        --file-header-background-focused:var(--background-primary);
        --file-header-border:            var(--divider-width) solid var(--divider-color);

        /* ── Shadow (unchanged) ───────────────────────────────────── */
        --shadow: var(--nx-shadow-lg, 0 1px 0 oklch(1 0 0 / 0.03) inset, 0 10px 30px oklch(0 0 0 / 0.35));

        /* SH-012: Legacy alias families (Forge, VSCode, color-*, bases)
           have been migrated to the canonical Obsidian token names above.
           This alias block has been removed. */
      }

      /* SH-004 / SH-014: density scales prose and chrome together.
         SH-014: kernel themes ship --nx-density-<level>-* variables so
         themes can override density sizing. The hex fallbacks match the
         canonical defaults and protect against FOUC before the kernel
         hydrates. */
      :root,
      [data-density="cozy"]    {
        --ui-size:           var(--nx-density-cozy-ui-size, 13px);
        --row-h:             var(--nx-density-cozy-row-h, 26px);
        --body-size:         var(--nx-density-cozy-body-size, 16px);
        --chrome-row-height: var(--nx-density-cozy-chrome-row-height, 36px);
        --chrome-icon-size:  var(--nx-density-cozy-chrome-icon-size, 24px);
      }
      [data-density="compact"] {
        --ui-size:           var(--nx-density-compact-ui-size, 12px);
        --row-h:             var(--nx-density-compact-row-h, 22px);
        --body-size:         var(--nx-density-compact-body-size, 15px);
        --chrome-row-height: var(--nx-density-compact-chrome-row-height, 30px);
        --chrome-icon-size:  var(--nx-density-compact-chrome-icon-size, 20px);
      }
      [data-density="spacious"] {
        --ui-size:           var(--nx-density-spacious-ui-size, 14px);
        --row-h:             var(--nx-density-spacious-row-h, 30px);
        --body-size:         var(--nx-density-spacious-body-size, 17px);
        --chrome-row-height: var(--nx-density-spacious-chrome-row-height, 40px);
        --chrome-icon-size:  var(--nx-density-spacious-chrome-icon-size, 28px);
      }

      /* Prevent white flash before the React tree mounts. */
      html, body { margin: 0; padding: 0; background: var(--background-primary); height: 100%; overflow: hidden; }
      #root { height: 100%; }
      /* SH-002: modal portal root. Sits above #root in stacking order
         because it appears later in the DOM. pointer-events:none on the
         container so the workspace beneath stays interactive when no
         modal is open; individual modals set pointer-events:auto. */
      #modal-root { position: fixed; inset: 0; pointer-events: none; z-index: var(--z-overlay-modal); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
