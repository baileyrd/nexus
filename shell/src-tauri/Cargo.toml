[package]
name    = "tauri-shell"
version = "0.1.0"
edition = "2021"
build   = "build.rs"

[package.metadata.tauri]

[lib]
name       = "tauri_shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri               = { version = "2", features = [] }
tauri-plugin-fs     = "2"
tauri-plugin-dialog = "2"
serde               = { version = "1", features = ["derive"] }
serde_json          = "1"
dirs                = "5"
