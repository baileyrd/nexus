[package]
name    = "nexus-shell"
version = "0.1.0"
edition = "2021"
build   = "build.rs"

[package.metadata.tauri]

[lib]
name       = "nexus_shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri               = { version = "2", features = [] }
tauri-plugin-fs     = "2"
tauri-plugin-dialog = "2"
serde               = { version = "1", features = ["derive"] }
serde_json          = "1"
dirs                = "5"
git2                = { version = "0.20", default-features = false }
tokio               = { version = "1", features = ["sync"] }

# Kernel path deps. These resolve across the workspace `exclude = ["shell"]`
# boundary without un-excluding this crate. See
# docs/shell-kernel-bridge-plan.md §Phase 0.
nexus-kernel     = { path = "../../crates/nexus-kernel" }
nexus-bootstrap  = { path = "../../crates/nexus-bootstrap" }
nexus-plugin-api = { path = "../../crates/nexus-plugin-api" }
nexus-plugins    = { path = "../../crates/nexus-plugins" }

[dev-dependencies]
tempfile            = "3"
