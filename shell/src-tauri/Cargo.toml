[package]
name    = "nexus-shell"
version = "0.1.0"
edition = "2021"
build   = "build.rs"

[package.metadata.tauri]

[lib]
name       = "nexus_shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# `custom-protocol` switches Tauri from dev-mode (loads `devUrl`) to
# production-mode (serves embedded `frontendDist` via the asset protocol).
# `tauri build` passes this automatically; plain `cargo build` does not,
# so the e2e harness must build with `--features custom-protocol`.
[features]
custom-protocol = ["tauri/custom-protocol"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri               = { version = "2", features = ["image-png"] }
tauri-plugin-fs           = "2"
tauri-plugin-dialog       = "2"
tauri-plugin-deep-link    = "2"
tauri-plugin-window-state = "2"
# BL-043 — global hotkey for the quick-capture overlay. Fires regardless of
# window focus so a backgrounded Nexus stays reachable for inbox capture.
tauri-plugin-global-shortcut = "2"
# BL-133 follow-up — OS-level desktop notifications (libnotify on Linux,
# UNUserNotificationCenter on macOS, ToastNotificationManager on Windows).
# The shell-side `nexus.notifications` plugin calls the `notify_desktop`
# bridge command to fire these alongside the in-app toast.
tauri-plugin-notification = "2"
serde               = { version = "1", features = ["derive"] }
serde_json          = "1"
dirs                = "5"
tokio               = { version = "1", features = ["sync"] }
uuid                = { version = "1", features = ["v4"] }
tracing             = "0.1"
tracing-subscriber  = { version = "0.3", features = ["env-filter", "fmt"] }
# OI-15 — Ed25519 manifest signature verification
ed25519-dalek       = "2"
hex                 = "0.4"

# Kernel path deps. These resolve across the workspace `exclude = ["shell"]`
# boundary without un-excluding this crate. See
# docs/shell-kernel-bridge-plan.md §Phase 0.
nexus-kernel     = { path = "../../crates/nexus-kernel" }
nexus-bootstrap  = { path = "../../crates/nexus-bootstrap" }
nexus-plugin-api = { path = "../../crates/nexus-plugin-api" }
nexus-plugins    = { path = "../../crates/nexus-plugins" }
nexus-panic-log  = { path = "../../crates/nexus-panic-log" }
# BL-140 Phase 3 — `boot_remote` / `kernel_invoke` over `ssh://` URIs.
nexus-remote     = { path = "../../crates/nexus-remote" }

[dev-dependencies]
tempfile            = "3"
