[workspace]
resolver = "2"
members = [
    "crates/nexus-types",
    "crates/nexus-kernel",
    "crates/nexus-security",
    "crates/nexus-storage",
    "crates/nexus-plugins",
    "crates/nexus-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[workspace.dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Logging/tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
tracing-appender = "0.2"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2.0"
async-trait = "0.1"

# Keyring (OS credential storage)
keyring = "3"

# SQLite
rusqlite = { version = "0.31", features = ["bundled", "backup"] }
r2d2 = "0.8"
r2d2_sqlite = "0.24"

# Full-text search
tantivy = "0.22"

# Markdown parsing
comrak = "0.28"

# File watching
notify = "7"
notify-debouncer-mini = "0.5"

# WASM runtime
wasmtime = "18"

# JSON Schema validation
jsonschema = "0.17"

# Semver parsing
semver = "1"

# Regex (lightweight)
regex-lite = "0.1"

# Parallelism
rayon = "1.10"

# Hashing
sha2 = "0.10"

# YAML frontmatter
serde_yaml = "0.9"

# System interfaces
libc = "0.2"

# File time manipulation
filetime = "0.2"

# Test utilities
tempfile = "3"

# CLI
clap = { version = "4.4", features = ["derive", "env"] }
anyhow = "1"
comfy-table = "7"
ctrlc = "3.4"
