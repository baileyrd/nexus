nt hash, modified timestamp, size"},{name:"Block Tree",description:"Parsed block structure from markdown/MDX files"},{name:"Link Index",description:"Forward links, backlinks, unresolved links"},{name:"Tag & Property Index",description:"All tags and frontmatter properties across the forge"},{name:"FTS5",description:"Full-text search index, supplemented by Tantivy for advanced queries"},{name:"Plugin Tables",description:"Core plugins register own tables via migrations (procmgr_commands, etc.)"}],relatedIds:["storage-engine","search-engine"],crate:"nexus-index"},{id:"crdt-sync",label:"CRDT Sync Engine",layer:"storage",tagline:"Conflict-free multi-device sync without a central server",description:"Uses automerge-rs or yrs for conflict-free merging. Sync is optional and local-first. Targets: peer-to-peer (LAN discovery), relay server (remote sync), and file-system adapters (Dropbox, iCloud, Git-based). Supports optional end-to-end encryption.",subComponents:[{name:"CRDT Engine",description:"automerge or yrs — conflict-free replicated data types"},{name:"Peer Discovery",description:"LAN discovery for peer-to-peer sync"},{name:"Relay Server",description:"Optional remote relay for sync across networks"},{name:"FS Adapters",description:"Dropbox, iCloud, or Git-based sync targets"}],relatedIds:["storage-engine","sqlite-index"],crate:"nexus-sync"},{id:"editor-engine",label:"Editor Engine",layer:"editor",tagline:"Hybrid editor: markdown on disk, block tree in memory, CM6 live preview",description:"The primary interaction surface. Uses a hybrid approach: files stored as markdown on disk, parsed into a block tree for Notion-style editing. Block tree is the in-memory representation; markdown is the persistence format. Rich text via annotations over text ranges. Live preview via CodeMirror 6 Decorations. Slash commands for quick block access.",subComponents:[{name:"Block Tree",description:"Every paragraph, heading, list, code block is a block node in a tree"},{name:"Rich Text",description:"Inline formatting stored as annotations over text ranges (Notion model)"},{name:"Live Preview",description:"CM6 Decorations — headings at size, images inline, syntax highlighting"},{name:"Slash Commands",description:"/ menu for block types, transformations, and plugin commands"}],relatedIds:["mdx-support","sqlite-index","ai-engine"]},{id:"mdx-support",label:"MDX Support",layer:"editor",tagline:"Interactive components embedded within documents",description:"MDX (Markdown + JSX) allows plugin-defined components to render inline within documents. Charts, forms, toggles, embeds live alongside prose. MDX files export to standard markdown with static component rendering for portability. Component runtime sandboxed for community components.",subComponents:[{name:"Component Runtime",description:"Sandboxed execution of plugin-defined JSX components"},{name:"Static Export",description:"MDX → standard markdown with components rendered as static content"}],relatedIds:["editor-engine","wasm-sandbox"]},{id:"database-engine",label:"Database Engine",layer:"database",tagline:"Notion-level structured data on a local-first, file-based architecture",description:"Databases stored as .bases files with Notion-level richness. Records have typed properties (20+ types including relations, rollups, formulas). Multiple simultaneous views over the same data: Table, Board (Kanban), List, Calendar, Gallery. Query engine supports compound filters (AND/OR), multi-field sorting, and a formula language for computed properties.",subComponents:[{name:"Property System",description:"20+ types: Title, Rich Text, Number, Select, Multi-Select, Date, Relation, Rollup, Formula, Status, etc."},{name:"View Engine",description:"Table, Board (Kanban), List, Calendar, Gallery — multiple views per database"},{name:"Query Engine",description:"Compound filters (AND/OR), multi-field sorting"},{name:"Formula Engine",description:"Text, date arithmetic, math, conditionals, collection ops (map/filter/sort)"},{nam nd regex search"},{name:"Auto-Restart Engine",description:"Configurable delay, exponential backoff on repeated crashes"},{name:"Signal Hierarchy",description:"SIGINT→SIGTERM→SIGKILL with process group/tree killing"},{name:"Environment Resolution",description:"Priority: per-command > .env file > shell defaults > forge-injected"},{name:"URL Auto-Detection",description:"Detects URLs in process output for quick-open"},{name:"Compound Commands",description:"&& splitting for visual steps (preserves cd in single shell)"}],relatedIds:["terminal","event-bus","sqlite-index","ai-engine"],crate:"nexus-pty"},{id:"ai-engine",label:"AI Engine",layer:"ai",tagline:"Provider-agnostic, three-tier intelligence layer woven into every surface",description:"Not a sidebar — a pervasive AI capability. Three tiers: Inline Assist (completions/edits in editor), Conversational AI (chat with forge context), and Agent Capabilities (autonomous multi-step workflows). Provider-agnostic: traits for completion, chat, embedding, tool-use. Multiple providers active simultaneously (e.g., local for embeddings, cloud for reasoning).",subComponents:[{name:"Tier 1 — Inline Assist",description:"Completions, edits, suggestions within the editor, context-aware"},{name:"Tier 2 — Conversational",description:"Chat surface referencing forge content, search, terminal, databases"},{name:"Tier 3 — Agent",description:"Autonomous workflows: read/write files, run commands, query DBs"},{name:"Provider Interface",description:"Abstract traits — Anthropic, OpenAI, Ollama, llama.cpp swappable"},{name:"Multi-Provider",description:"Multiple providers active: local for embeddings, cloud for reasoning"}],relatedIds:["agent-system","editor-engine","terminal","mcp-host"],crate:"nexus-ai"},{id:"agent-system",label:"Agent System",layer:"ai",tagline:"Built-in archetypes + custom agent framework for autonomous task execution",description:"Agents bridge user intent and application action. Six built-in archetypes: Coding, Research, Refac patible AI) can operate on a forge without the GUI — enabling headless and CI/CD workflows.",subComponents:[{name:"Forge Operations",description:"Read/write/search notes, query databases, traverse links"},{name:"Terminal Access",description:"Execute commands, read output, manage sessions"},{name:"Process Manager",description:"Start/stop/monitor processes, query status"},{name:"Search",description:"Full-text and structured search across the forge"},{name:"Database Queries",description:"Query and mutate .bases databases"},{name:"Plugin Commands",description:"Invoke any registered plugin command"}],relatedIds:["mcp-host","cli-tool"]},{id:"cli-tool",label:"CLI (forge)",layer:"cli",tagline:"Full application parity in a headless environment",description:"Native Rust binary (nexus-cli) that instantiates the kernel and plugins without GUI. Full parity: forge management, content ops, database ops, plugin management, AI ops, process manager, terminal, MCP, sync, automation. Reads the same SQLite database as the GUI. Headless mode with JSON/JSONL output, non-interactive mode, watch mode, MCP server mode.",subComponents:[{name:"Forge Management",description:"init, open, config, status"},{name:"Content Operations",description:"create, read, edit, delete, search"},{name:"Database Operations",description:"db query, db create, db add-record, db export"},{name:"Process Manager CLI",description:"proc list, proc run <slug>, proc stop <slug>, proc new, proc stop-all"},{name:"AI Operations",description:"ai ask, ai complete, agent run <agent-name>"},{name:"MCP CLI",description:"mcp serve (start server), mcp connect (connect to server)"},{name:"Headless Mode",description:"JSON/JSONL output, non-interactive, watch mode"}],relatedIds:["event-bus","sqlite-index","mcp-server"],crate:"nexus-cli"},{id:"search-engine",label:"Search Engine",layer:"storage",tagline:"Tantivy full-text search + SQLite FTS5 for instant forge-wide queries",description:"Dual search: SQLite FTS5 for fast in-index querie
