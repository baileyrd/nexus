<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
<style>text{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ea580c"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6b7280"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
</defs>
<rect width="1200" height="800" fill="#ffffff"/>
<text x="600.0" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">System Context — Nexus</text>
<text x="600.0" y="58" text-anchor="middle" font-size="12" fill="#6b7280">Level 1 (C4): people, the Nexus system, and external systems</text>
<circle cx="180" cy="120" r="14" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<rect x="140" y="138" width="80" height="56" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="180" y="160" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Knowledge</text>
<text x="180" y="178" text-anchor="middle" font-size="10" fill="#6b7280">Worker</text>
<circle cx="360" cy="120" r="14" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<rect x="320" y="138" width="80" height="56" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="360" y="160" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Plugin</text>
<text x="360" y="178" text-anchor="middle" font-size="10" fill="#6b7280">Author</text>
<rect x="500" y="340" width="340" height="140" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
<text x="670.0" y="374" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">Nexus</text>
<text x="670.0" y="400" text-anchor="middle" font-size="12" fill="#374151">AI-native knowledge environment</text>
<text x="670.0" y="422" text-anchor="middle" font-size="11" fill="#6b7280">Rust microkernel with CLI, TUI,</text>
<text x="670.0" y="440" text-anchor="middle" font-size="11" fill="#6b7280">MCP server, Tauri desktop shell</text>
<rect x="900" y="120" width="180" height="84" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="990" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">MCP Client</text>
<text x="990" y="170" text-anchor="middle" font-size="10" fill="#6b7280">Claude Code, Cursor</text>
<rect x="80" y="560" width="180" height="84" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="170" y="588" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Forge (Filesystem)</text>
<text x="170" y="610" text-anchor="middle" font-size="10" fill="#6b7280">Markdown + .forge/ index</text>
<rect x="1000" y="560" width="180" height="84" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="1090" y="588" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">AI Providers</text>
<text x="1090" y="610" text-anchor="middle" font-size="10" fill="#6b7280">Claude / OpenAI / Ollama</text>
<rect x="360" y="620" width="180" height="84" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="450" y="648" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Git Repository</text>
<text x="450" y="670" text-anchor="middle" font-size="10" fill="#6b7280">Optional — libgit2</text>
<rect x="640" y="620" width="180" height="84" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,3"/>
