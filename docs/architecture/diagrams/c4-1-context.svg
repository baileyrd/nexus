<text x="730" y="670" text-anchor="middle" font-size="10" fill="#6b7280">Secret Service / Keychain</text>
<path d="M 180,194 L 560,340" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="312.0" y="258" width="116" height="16" fill="#ffffff" opacity="0.95"/>
<text x="370" y="270" text-anchor="middle" font-size="11" fill="#374151">Uses (CLI/TUI/GUI)</text>
<path d="M 360,194 L 640,340" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="445.0" y="258" width="110" height="16" fill="#ffffff" opacity="0.95"/>
<text x="500" y="270" text-anchor="middle" font-size="11" fill="#374151">Publishes plugins</text>
<path d="M 900,160 L 840,380" stroke="#ea580c" stroke-width="1.8" fill="none" marker-end="url(#arrow-orange)"/>
<rect x="843.0" y="261" width="74" height="16" fill="#ffffff" opacity="0.95"/>
<text x="880" y="273" text-anchor="middle" font-size="11" fill="#374151">MCP / stdio</text>
<path d="M 560,480 L 220,560" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
<rect x="334.0" y="511" width="92" height="16" fill="#ffffff" opacity="0.95"/>
<text x="380" y="523" text-anchor="middle" font-size="11" fill="#374151">Reads / writes</text>
<path d="M 800,480 L 1080,560" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="897.0" y="511" width="86" height="16" fill="#ffffff" opacity="0.95"/>
<text x="940" y="523" text-anchor="middle" font-size="11" fill="#374151">HTTPS / local</text>
<path d="M 620,480 L 480,620" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)" stroke-dasharray="5,3"/>
<rect x="519.0" y="546" width="50" height="16" fill="#ffffff" opacity="0.95"/>
<text x="544" y="558" text-anchor="middle" font-size="11" fill="#374151">libgit2</text>
<path d="M 720,480 L 720,620" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)" stroke-dasharray="5,3"/>
<rect x="671.0" y="546" width="98" height="16" fill="#ffffff" opacity="0.95"/>
<text x="720" y="558" text-anchor="middle" font-size="11" fill="#374151">Stores API keys</text>
<g transform="translate(40,720)">
<rect x="0" y="0" width="340" height="60" rx="6" fill="#ffffff" stroke="#d1d5db"/>
<text x="12" y="18" font-size="11" font-weight="600" fill="#111827">Legend</text>
<line x1="12" y1="32" x2="34" y2="32" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
<text x="42" y="36" font-size="10" fill="#374151">Primary use / data</text>
<line x1="182" y1="32" x2="204" y2="32" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
<text x="212" y="36" font-size="10" fill="#374151">File I/O</text>
<line x1="12" y1="50" x2="34" y2="50" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
<text x="42" y="54" font-size="10" fill="#374151">Control / trigger</text>
<line x1="182" y1="50" x2="204" y2="50" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
<text x="212" y="54" font-size="10" fill="#374151">Auxiliary (dashed)</text>
</g>
</svg>