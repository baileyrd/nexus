<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" width="960" height="820">
  <defs>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; font-weight: 500; fill: #6b7280; }
    .section { font-size: 12px; font-weight: 700; fill: #2563eb; letter-spacing: 1.3px; }
    .node-title { font-size: 14px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 11px; font-weight: 500; fill: #6b7280; }
    .node-type { font-size: 10px; font-weight: 700; fill: #9ca3af; letter-spacing: 0.08em; }
    .mono-dim { font-family: Menlo, Consolas, monospace; font-size: 10px; fill: #7c3aed; }
    .legend { font-size: 11px; font-weight: 500; fill: #6b7280; }
    </style>
  </defs>
  <rect width="960" height="820" fill="#ffffff"/>
  <text x="40" y="44" class="title">Sidebar (Left Split) Anatomy</text>
  <text x="40" y="64" class="subtitle">.workspace-split.mod-left-split → .workspace-tabs.mod-top → tab-header → view body (.nav-header + tree)</text>

  <!-- Rendered view on left -->
  <rect x="40" y="96" width="300" height="680" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="56" y="116" class="section">RENDERED SIDEBAR</text>

  <!-- Tab header container -->
  <rect x="56" y="130" width="268" height="40" rx="4" fill="#f1f5f9" stroke="#2563eb" stroke-width="1.6"/>
  <text x="190" y="150" text-anchor="middle" class="node-type">.workspace-tab-header-container</text>
  <text x="190" y="164" text-anchor="middle" class="mono-dim">height --header-height = 40px (css:6092-6101)</text>

  <!-- Tabs inside -->
  <rect x="64" y="138" width="88" height="24" rx="3" fill="#ffffff" stroke="#93c5fd"/>
  <text x="108" y="154" text-anchor="middle" class="node-sub">Files</text>
  <rect x="156" y="138" width="80" height="24" rx="3" fill="#e5e7eb" stroke="#cbd5e1"/>
  <text x="196" y="154" text-anchor="middle" class="node-sub">Search</text>
  <rect x="240" y="138" width="80" height="24" rx="3" fill="#e5e7eb" stroke="#cbd5e1"/>
  <text x="280" y="154" text-anchor="middle" class="node-sub">Tags</text>

  <!-- Suppressed view-header -->
  <rect x="56" y="176" width="268" height="18" rx="3" fill="#fee2e2" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="190" y="189" text-anchor="middle" class="mono-dim" fill="#991b1b">.view-header — display:none (css:4204-4207)</text>

  <!-- Nav header -->
  <rect x="56" y="200" width="268" height="86" rx="4" fill="#ffffff" stroke="#10b981" stroke-width="1.6"/>
  <text x="190" y="218" text-anchor="middle" class="node-type">.nav-header</text>
  <text x="190" y="232" text-anchor="middle" class="mono-dim">padding 8px (css:8344-8346)</text>
  <rect x="64" y="238" width="252" height="22" rx="3" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="190" y="253" text-anchor="middle" class="node-sub">.search-input-container  (margin 4px auto)</text>
  <rect x="64" y="264" width="252" height="18" rx="3" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="190" y="277" text-anchor="middle" class="node-sub">.nav-buttons-container · gap 2px · wrap</text>

  <!-- Nav files tree -->
  <rect x="56" y="292" width="268" height="430" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4"/>
  <text x="190" y="310" text-anchor="middle" class="node-type">.nav-files-container  (view-content)</text>
  <g>
    <text x="68" y="332" class="node-sub">▾ 📁 Notes</text>
    <text x="84" y="350" class="node-sub">📄 Daily.md</text>
    <text x="84" y="368" class="node-sub">📄 Readme.md</text>
    <text x="68" y="390" class="node-sub">▸ 📁 Projects</text>
    <text x="68" y="408" class="node-sub">▾ 📁 Archive</text>
    <text x="84" y="426" class="node-sub">📄 Old.md</text>
  </g>
  <text x="190" y="478" text-anchor="middle" class="mono-dim">--nav-item-padding: 4px 8px 4px 24px  (css:2444)</text>
  <text x="190" y="494" text-anchor="middle" class="mono-dim">--nav-item-radius: --radius-s = 4px</text>
  <text x="190" y="510" text-anchor="middle" class="mono-dim">--nav-item-children-margin-start: 12px</text>
  <text x="190" y="546" text-anchor="middle" class="node-sub">view-content height: 100%</text>
  <text x="190" y="562" text-anchor="middle" class="mono-dim">(overrides calc rule · css:4298-4301)</text>

  <!-- resize handle indicator -->
  <rect x="324" y="130" width="4" height="592" fill="#a78bfa"/>
  <text x="352" y="140" class="node-type" transform="rotate(90 352 140)" fill="#6d28d9">resize handle</text>

  <!-- Right pane: measurement details -->
  <rect x="376" y="96" width="536" height="680" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="392" y="116" class="section">DIMENSIONS &amp; SELECTORS</text>

  <rect x="392" y="132" width="504" height="62" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="408" y="150" class="node-type">.workspace-split.mod-left-split  (css:5957-5960)</text>
  <text x="408" y="168" class="node-title">flex: 0 0 auto  ·  width set by JS (persisted)</text>
  <text x="408" y="184" class="mono-dim">no explicit min/max width in app.css — runtime-controlled</text>

  <rect x="392" y="202" width="504" height="62" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="408" y="220" class="node-type">.workspace-tab-header-container  (css:6092-6101)</text>
  <text x="408" y="238" class="node-title">height 40px · bg --tab-container-background · border-bottom 1px</text>
  <text x="408" y="254" class="mono-dim">padding: 0 var(--size-4-2) = 0 8px</text>

  <rect x="392" y="272" width="504" height="62" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="408" y="290" class="node-type">.workspace-tab-header-container-inner  (css:6105-6112)</text>
  <text x="408" y="308" class="node-title">-webkit-app-region: drag  ·  margin 6px -5px calc(--tab-outline-width*-1)</text>
  <text x="408" y="324" class="mono-dim">padding: 1px 15px 0 · overflow: auto (horizontal tab scroll)</text>

  <rect x="392" y="342" width="504" height="50" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="408" y="360" class="node-type" fill="#991b1b">.workspace-split.mod-left-split .view-header  (css:4204-4207)</text>
  <text x="408" y="378" class="node-title" fill="#991b1b">display: none  —  view-headers NOT rendered in sidebars</text>

  <rect x="392" y="400" width="504" height="62" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="408" y="418" class="node-type">.workspace-split.mod-left-split .view-content  (css:4298-4301)</text>
  <text x="408" y="436" class="node-title">height: 100% · overflow: auto</text>
  <text x="408" y="452" class="mono-dim">overrides the calc(100% - --header-height) rule that applies in root</text>

  <rect x="392" y="470" width="504" height="62" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="408" y="488" class="node-type">.nav-header  (css:8344-8359)</text>
  <text x="408" y="506" class="node-title">padding 8px · search-input-container margin 4px auto</text>
  <text x="408" y="522" class="mono-dim">.nav-buttons-container — gap 2px · flex-wrap · has-separator adds bottom border</text>

  <rect x="392" y="540" width="504" height="62" rx="6" fill="#ffffff" stroke="#f97316" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="408" y="558" class="node-type">.workspace-split.mod-left-split &gt; .workspace-leaf-resize-handle  (css:5926-5941, 5965-5971)</text>
  <text x="408" y="576" class="node-title">width: --divider-width-hover = 3px  ·  border 1px  ·  col-resize</text>
  <text x="408" y="592" class="mono-dim">z-index: --layer-status-bar = 15  ·  height --divider-vertical-height = calc(100% - 40px)</text>

  <rect x="392" y="610" width="504" height="62" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="408" y="628" class="node-type">.workspace-sidedock-vault-profile  (desktop only · css:5778-5830)</text>
  <text x="408" y="646" class="node-title">Vault switcher + actions · bottom strip</text>
  <text x="408" y="662" class="mono-dim">body:not(.is-mobile) .workspace-split.mod-left-split .workspace-sidedock-vault-profile</text>

  <rect x="392" y="680" width="504" height="62" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="408" y="698" class="node-type">COLLAPSED STATE</text>
  <text x="408" y="716" class="node-title">.workspace-split.mod-left-split.is-sidedock-collapsed</text>
  <text x="408" y="732" class="mono-dim">.is-translucent variant hides the tab row (css:5961-5964)</text>

  <!-- Legend -->
  <rect x="40" y="786" width="872" height="24" rx="5" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="54" cy="800" r="5" fill="#2563eb"/><text x="66" y="803" class="legend">Container</text>
  <circle cx="160" cy="800" r="5" fill="#10b981"/><text x="172" y="803" class="legend">Rendered region</text>
  <circle cx="310" cy="800" r="5" fill="#7c3aed"/><text x="322" y="803" class="legend">Body / tree</text>
  <circle cx="440" cy="800" r="5" fill="#f97316"/><text x="452" y="803" class="legend">Resize handle</text>
  <circle cx="580" cy="800" r="5" fill="#ef4444"/><text x="592" y="803" class="legend">Hidden / collapsed</text>
</svg>
