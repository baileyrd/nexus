<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 900" width="960" height="900">
  <defs>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; font-weight: 500; fill: #6b7280; }
    .section { font-size: 12px; font-weight: 700; fill: #2563eb; letter-spacing: 1.3px; }
    .node-title { font-size: 13px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 11px; font-weight: 500; fill: #6b7280; }
    .node-type { font-size: 10px; font-weight: 700; fill: #9ca3af; letter-spacing: 0.08em; }
    .mono { font-family: Menlo, Consolas, monospace; font-size: 11px; fill: #111827; }
    .mono-dim { font-family: Menlo, Consolas, monospace; font-size: 10px; fill: #7c3aed; }
    .cls { font-family: Menlo, Consolas, monospace; font-size: 13px; font-weight: 700; fill: #111827; }
    .legend { font-size: 11px; font-weight: 500; fill: #6b7280; }
    </style>
  </defs>
  <rect width="960" height="900" fill="#ffffff"/>
  <text x="40" y="44" class="title">Body State Modifier Classes</text>
  <text x="40" y="64" class="subtitle">Each body class on the left; selectors it enables / modifies on the right · grouped by category</text>

  <!-- FRAME STATE group -->
  <rect x="40" y="88" width="880" height="184" rx="10" fill="none" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="56" y="108" class="section">FRAME STATE</text>

  <rect x="56" y="120" width="200" height="44" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4"/>
  <text x="66" y="136" class="node-type">CLASS</text>
  <text x="66" y="154" class="cls">.is-frameless</text>
  <rect x="272" y="120" width="632" height="44" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="138" class="mono">body padding-top: 30px (3976) · .titlebar height 30px (3979-3982)</text>
  <text x="284" y="154" class="mono">:not(.is-maximized) adds padding-top 2px on titlebar (3984-3985)</text>

  <rect x="56" y="172" width="200" height="44" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4"/>
  <text x="66" y="188" class="node-type">CLASS</text>
  <text x="66" y="206" class="cls">.is-hidden-frameless</text>
  <rect x="272" y="172" width="632" height="44" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="190" class="mono">.titlebar height 39px (3987) · -webkit-app-region:no-drag (4022) · --divider-vertical-height 100% (4008)</text>
  <text x="284" y="206" class="mono">.titlebar-button.mod-logo display:none (4025) · mod-macos hides titlebar; WL makes it transparent (5701-5720)</text>

  <rect x="56" y="224" width="200" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4"/>
  <text x="66" y="240" class="node-type">CLASS</text>
  <text x="66" y="256" class="cls">.starter</text>
  <rect x="272" y="224" width="632" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="242" class="mono">hidden-frameless.starter restores titlebar to 30px (3990) · keeps drag region (4022 excludes .starter)</text>
  <text x="284" y="258" class="mono">special titlebar rules at 17482-17493</text>

  <!-- PLATFORM -->
  <rect x="40" y="288" width="880" height="200" rx="10" fill="none" stroke="#7c3aed" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="56" y="308" class="section">PLATFORM</text>

  <rect x="56" y="320" width="200" height="48" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.4"/>
  <text x="66" y="336" class="node-type">CLASS</text>
  <text x="66" y="354" class="cls">.mod-macos</text>
  <rect x="272" y="320" width="632" height="48" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="338" class="mono">--frame-left-space 36px (3963) · --frame-right-space 0 (3964) · titlebar-button-container top:8px (5650)</text>
  <text x="284" y="354" class="mono">.mod-macos .titlebar-button-container.mod-left left: 80px/zoom (5656) · buttons get --radius-s (5694)</text>

  <rect x="56" y="376" width="200" height="48" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.4"/>
  <text x="66" y="392" class="node-type">CLASS</text>
  <text x="66" y="410" class="cls">.mod-windows</text>
  <rect x="272" y="376" width="632" height="48" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="394" class="mono">--frame-left-space 0 · --frame-right-space 126px (3971-3972) · tb-button padding 0 16px (5728-5731)</text>
  <text x="284" y="410" class="mono">tb-button-container full height (5723) · close:hover bg --background-modifier-error + white icon (5738-5746)</text>

  <rect x="56" y="432" width="200" height="48" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.4"/>
  <text x="66" y="448" class="node-type">CLASS</text>
  <text x="66" y="466" class="cls">.mod-linux</text>
  <rect x="272" y="432" width="632" height="48" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="450" class="mono">Same rules as .mod-windows (3969-3972 share a selector list) · close:hover error bg (5738-5746)</text>
  <text x="284" y="466" class="mono">hidden-frameless: titlebar transparent, pointer-events none; buttons re-enable via pointer-events:auto</text>

  <!-- WINDOW STATE -->
  <rect x="40" y="504" width="880" height="200" rx="10" fill="none" stroke="#10b981" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="56" y="524" class="section">WINDOW STATE</text>

  <rect x="56" y="536" width="200" height="48" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.4"/>
  <text x="66" y="552" class="node-type">CLASS</text>
  <text x="66" y="570" class="cls">.is-maximized</text>
  <rect x="272" y="536" width="632" height="48" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="554" class="mono">Removes the 2px padding-top on frameless .titlebar (3983-3985 uses :not(.is-maximized))</text>
  <text x="284" y="570" class="mono">No separate rule layer; interacts with is-frameless only</text>

  <rect x="56" y="592" width="200" height="48" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.4"/>
  <text x="66" y="608" class="node-type">CLASS</text>
  <text x="66" y="626" class="cls">.is-fullscreen</text>
  <rect x="272" y="592" width="632" height="48" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="610" class="mono">.titlebar display:none (3993-3994) · disables frame-space padding rules (4037, 4040 require :not)</text>
  <text x="284" y="626" class="mono">.status-bar loses right padding (5557-5559 requires body:not)</text>

  <rect x="56" y="648" width="200" height="48" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.4"/>
  <text x="66" y="664" class="node-type">CLASS</text>
  <text x="66" y="682" class="cls">.is-focused</text>
  <rect x="272" y="648" width="632" height="48" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="666" class="mono">--titlebar-background → -focused (4000-4002) · --tab-container-background → -focused (4004-4006)</text>
  <text x="284" y="682" class="mono">.workspace-leaf.mod-active .view-header bg focused (4201) · tab-header-container is-active flips color (6132-6147)</text>

  <!-- VISIBILITY -->
  <rect x="40" y="720" width="880" height="148" rx="10" fill="none" stroke="#f97316" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="56" y="740" class="section">VISIBILITY &amp; MODE</text>

  <rect x="56" y="752" width="200" height="36" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.4"/>
  <text x="66" y="774" class="cls">.show-view-header</text>
  <rect x="272" y="752" width="632" height="36" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="774" class="mono">Without it: body:not(.show-view-header):not(.is-phone) .view-header { display:none }  (4198-4200)</text>

  <rect x="56" y="792" width="200" height="36" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.4"/>
  <text x="66" y="814" class="cls">.show-ribbon</text>
  <rect x="272" y="792" width="632" height="36" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="814" class="mono">Without it: --ribbon-width 0px + .workspace-ribbon { display:none }  (4409-4414)</text>

  <rect x="56" y="832" width="200" height="30" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.4"/>
  <text x="66" y="852" class="cls">.is-translucent</text>
  <rect x="272" y="832" width="632" height="30" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="284" y="852" class="mono">Collapsed side-split .workspace-tabs visibility:hidden (5961-5964); sidebar-toggle chrome tweaks (5765-5768)</text>

  <!-- Legend -->
  <rect x="40" y="876" width="880" height="18" rx="5" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="54" y="880" width="12" height="10" fill="#eff6ff" stroke="#2563eb"/><text x="72" y="889" class="legend">Frame</text>
  <rect x="138" y="880" width="12" height="10" fill="#f5f3ff" stroke="#7c3aed"/><text x="156" y="889" class="legend">Platform</text>
  <rect x="230" y="880" width="12" height="10" fill="#ecfdf5" stroke="#10b981"/><text x="248" y="889" class="legend">Window state</text>
  <rect x="350" y="880" width="12" height="10" fill="#fff7ed" stroke="#f97316"/><text x="368" y="889" class="legend">Visibility / mode</text>
</svg>
