<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720">
  <defs>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; font-weight: 500; fill: #6b7280; }
    .section { font-size: 12px; font-weight: 700; fill: #2563eb; letter-spacing: 1.3px; }
    .node-title { font-size: 14px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 11px; font-weight: 500; fill: #6b7280; }
    .node-type { font-size: 10px; font-weight: 700; fill: #9ca3af; letter-spacing: 0.08em; }
    .mono-dim { font-family: Menlo, Consolas, monospace; font-size: 10px; fill: #7c3aed; }
    .legend { font-size: 11px; font-weight: 500; fill: #6b7280; }
    </style>
  </defs>
  <rect width="960" height="720" fill="#ffffff"/>
  <text x="40" y="44" class="title">Status Bar Anatomy</text>
  <text x="40" y="64" class="subtitle">.status-bar · position:fixed · bottom:0 right:0 · floating overlay · items on the right cluster</text>

  <!-- Rendered status bar (scaled up for legibility) -->
  <rect x="40" y="96" width="880" height="140" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="56" y="116" class="section">RENDERED STATUS BAR (pinned bottom-right)</text>

  <!-- Backdrop showing the surrounding window edge -->
  <rect x="56" y="130" width="848" height="86" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="68" y="148" class="node-type">app content (z-index below 15)</text>

  <!-- Status bar element -->
  <rect x="548" y="178" width="356" height="34" rx="8" fill="#f8fafc" stroke="#6b7280" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="560" y="198" class="node-type">.status-bar</text>
  <!-- Items: file info, mode, word count, vault, sync etc. -->
  <rect x="560" y="186" width="70" height="20" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="595" y="200" text-anchor="middle" class="node-sub">1,245 words</text>
  <rect x="634" y="186" width="52" height="20" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="660" y="200" text-anchor="middle" class="node-sub">Edit</text>
  <rect x="690" y="186" width="72" height="20" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="726" y="200" text-anchor="middle" class="node-sub">🔄 Synced</text>
  <rect x="766" y="186" width="86" height="20" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="809" y="200" text-anchor="middle" class="node-sub">Vault · Nexus</text>
  <rect x="856" y="186" width="40" height="20" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="876" y="200" text-anchor="middle" class="node-sub">⌘</text>

  <!-- Callouts -->
  <text x="548" y="230" class="mono-dim">fixed bottom:0 right:0 · rounded upper-left only (radius 8px 0 0 0 · css:2664)</text>

  <!-- Measurements grid -->
  <rect x="40" y="256" width="880" height="438" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="56" y="276" class="section">DIMENSIONS &amp; TOKENS</text>

  <rect x="56" y="292" width="420" height="62" rx="6" fill="#ffffff" stroke="#6b7280" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="72" y="310" class="node-type">.status-bar  (css:5536-5556)</text>
  <text x="72" y="328" class="node-title">position: fixed · bottom:0 · right:0 · width:auto</text>
  <text x="72" y="344" class="mono-dim">min-height: 18px · padding: 4px · gap: 4px · z-index 15</text>

  <rect x="488" y="292" width="416" height="62" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="504" y="310" class="node-type">body:not(.is-fullscreen) .status-bar  (css:5557-5559)</text>
  <text x="504" y="328" class="node-title">padding-right: 8px</text>
  <text x="504" y="344" class="mono-dim">avoids hugging the right edge when not fullscreen</text>

  <rect x="56" y="366" width="420" height="62" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="72" y="384" class="node-type">.status-bar-item  (css:5560-5567)</text>
  <text x="72" y="402" class="node-title">padding: 3px 4px · border-radius 4px</text>
  <text x="72" y="418" class="mono-dim">line-height: 1 · display: inline-flex</text>

  <rect x="488" y="366" width="416" height="62" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="504" y="384" class="node-type">.status-bar-item-segment  (css:5595-5602)</text>
  <text x="504" y="402" class="node-title">margin-inline-end 8px · gap 4px</text>
  <text x="504" y="418" class="mono-dim">last-child margin-inline-end: 0</text>

  <rect x="56" y="440" width="420" height="62" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="72" y="458" class="node-type">.status-bar-item.mod-clickable:hover  (css:5571-5575)</text>
  <text x="72" y="476" class="node-title">bg: --background-modifier-hover</text>
  <text x="72" y="492" class="mono-dim">color: --text-normal · cursor: var(--cursor)</text>

  <rect x="488" y="440" width="416" height="62" rx="6" fill="#ffffff" stroke="#f97316" stroke-width="1.6" filter="url(#shadowSoft)"/>
  <text x="504" y="458" class="node-type">.status-bar-item:empty  (css:5587-5589)</text>
  <text x="504" y="476" class="node-title">display: none — empty items collapse</text>
  <text x="504" y="492" class="mono-dim">plugins that render empty strings don't leave a gap</text>

  <rect x="56" y="514" width="848" height="110" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="72" y="534" class="node-type">CUSTOM PROPERTIES (css:2658-2664)</text>
  <text x="72" y="554" class="mono-dim">--status-bar-background: var(--background-secondary)</text>
  <text x="72" y="570" class="mono-dim">--status-bar-border-color: var(--divider-color)</text>
  <text x="72" y="586" class="mono-dim">--status-bar-border-width: var(--border-width) 0 0 var(--border-width)   (top + left only)</text>
  <text x="72" y="602" class="mono-dim">--status-bar-font-size: var(--font-ui-smaller)</text>
  <text x="72" y="618" class="mono-dim">--status-bar-text-color: var(--text-muted)</text>
  <text x="504" y="554" class="mono-dim">--status-bar-position: fixed</text>
  <text x="504" y="570" class="mono-dim">--status-bar-radius: var(--radius-m) 0 0 0   (= 8px 0 0 0)</text>
  <text x="504" y="586" class="mono-dim">font-variant-numeric: tabular-nums (css:5555)</text>
  <text x="504" y="602" class="mono-dim">.is-screenshotting .status-bar → display:none (css:5604-5606)</text>
  <text x="504" y="618" class="mono-dim">user-select: none</text>

  <!-- Legend -->
  <rect x="40" y="692" width="880" height="22" rx="5" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="54" cy="704" r="5" fill="#6b7280"/><text x="66" y="707" class="legend">Container</text>
  <circle cx="160" cy="704" r="5" fill="#7c3aed"/><text x="172" y="707" class="legend">Item / segment</text>
  <circle cx="300" cy="704" r="5" fill="#10b981"/><text x="312" y="707" class="legend">Hover state</text>
  <circle cx="420" cy="704" r="5" fill="#f97316"/><text x="432" y="707" class="legend">Empty / hidden</text>
  <circle cx="550" cy="704" r="5" fill="#2563eb"/><text x="562" y="707" class="legend">Fullscreen override</text>
</svg>
