[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "wiki-bench"
version = "0.0.1"
description = "Benchmark stuff vs RAG vs LLM-wiki on HotpotQA"
requires-python = ">=3.10"
dependencies = [
    "anthropic>=0.40",
    "datasets>=2.14",
    "rank-bm25>=0.2.2",
    "numpy>=1.24",
    "tqdm>=4.65",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7", "ruff>=0.5"]

[project.scripts]
wiki-bench = "wiki_bench.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"
