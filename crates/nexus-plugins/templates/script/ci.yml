name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Typecheck
        run: pnpm typecheck
      - name: Typecheck tests
        run: pnpm typecheck:test
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
