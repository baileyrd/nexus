[package]
name = "nexus-plugins"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Nexus plugin system: manifest parsing, WASM sandbox, host functions, plugin loader, settings, hot-reload"

[dependencies]
nexus-plugin-api = { workspace = true }
nexus-kernel = { path = "../nexus-kernel" }
nexus-types = { path = "../nexus-types" }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
wasmtime = { workspace = true }
jsonschema = { workspace = true }
semver = { workspace = true }
regex-lite = { workspace = true }
notify = { workspace = true }
notify-debouncer-mini = { workspace = true }
# BL-101: granted_caps.json at-rest encryption.
chacha20poly1305 = { workspace = true }
rand = { workspace = true }
keyring = { workspace = true }
# BL-099: plugin manifest signing.
ed25519-dalek = { workspace = true }
base64 = { workspace = true }
dirs = { workspace = true }
sha2 = { workspace = true }
# C81 — host::http_request performs a blocking outbound request (mirrors the
# already-blocking std::fs I/O in host::read_file/write_file). `blocking`
# pulls its own dedicated background-thread runtime, so it's safe to call
# from a host fn even when the guest call itself runs inside a tokio worker.
reqwest = { workspace = true, features = ["blocking"] }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
criterion = { workspace = true }
# Compile WAT (WebAssembly Text Format) fixtures at test time so we don't
# vendor `.wasm` binaries for every regression test. Pure-Rust, no extra
# toolchain. Used by `tests/wasm_capability_denial.rs`.
wat = "1"

[[bench]]
name = "ipc_dispatch"
harness = false
