# BL-138 — per-handler capability matrix.
#
# Every IPC handler registered by an in-tree core plugin MUST appear in
# this file, classified as either:
#   - `caps = [...]`        → caller must hold every listed cap (on top
#                             of the unconditional `ipc.call` check).
#   - `unrestricted = "…"`  → handler is intentionally available to any
#                             caller with `ipc.call`. The string is the
#                             one-line rationale (read-only probe,
#                             version negotiation, etc.). Replaces the
#                             pre-BL-138 implicit default.
#
# Optional fields:
#   - `note   = "…"`        → free-form audit trail.
#   - `policy = "name"`     → references a named args-aware closure in
#                             `crates/nexus-bootstrap/src/cap_policies.rs`
#                             (ADR 0022 Phase 2). Stacks on top of `caps`.
#
# Handler version aliases (`<cmd>.v1` per ADR 0021) do NOT need a row
# here — the matrix applier auto-mirrors a classification onto every
# `.v<N>` alias of the same handler. Author the bare `cmd` once.
#
# The `cap_matrix_complete` integration test boots a runtime, walks
# every `(plugin, command)` pair in the live registry, and fails if any
# handler is missing a row. BL-138 Phase 1 ships the matrix structure
# plus the 17 historical `add_cap_requirement` entries below — the
# completeness test is `#[ignore]`d until per-service-plugin follow-ups
# land the unrestricted classifications for the remaining handlers.
#
# When adding a new IPC handler:
#   1. Decide whether the handler needs an extra cap (think: does it
#      spawn processes, write external files, mutate credentials,
#      reach the network, surface to AI as a tool, etc.). If yes →
#      `caps = ["…"]`. If no → `unrestricted = "<why>"`.
#   2. Append the row here.
#   3. Run `cargo test -p nexus-bootstrap --test cap_matrix_complete --
#      --ignored` to confirm.
#
# Doc cross-link: `docs/adr/0002-hierarchical-capability-strings.md`.

# ─── com.nexus.terminal — process-spawning surfaces (issue #77) ──────

[[handler]]
plugin = "com.nexus.terminal"
command = "create_session"
caps = ["process.spawn"]
note = "spawns arbitrary processes with guest-supplied shell/working_dir/env"

# ─── com.nexus.mcp.host — process-spawning surfaces (issue #77) ──────

[[handler]]
plugin = "com.nexus.mcp.host"
command = "connect"
caps = ["process.spawn"]
note = "spawns the MCP server's command over stdio"

