# BL-138 Phase 2 — `unrestricted` classifications for the remaining
# IPC handlers. Each row preserves the pre-BL-138 behaviour (any
# caller with `ipc.call` may dispatch); the rationale documents WHY
# no extra cap is required so a future auditor sees the intent
# rather than the omission.
#
# Rows tagged `# AUDIT:` are candidates for a follow-up cap review:
# they preserve current behaviour today but the security author
# believed elevation might be warranted. Spinning those into real
# `caps = […]` requirements is out of scope for the no-behaviour-
# change Phase 2 migration; they're flagged so a follow-up PR can
# pick them up cleanly.
