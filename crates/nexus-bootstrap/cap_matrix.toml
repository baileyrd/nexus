# BL-113 Phase 1c — plugin contribution lifecycle. Called by the
# bootstrap-side wiring at plugin load/unload; not user-facing.
# Gated by `protocol.host.contribute` (BL-113 follow-up, 2026-05-17):
# only invoker plugins (CLI/TUI/shell, via `TrustLevel::Core =>
# Capability::ALL`) can drive these verbs. A community plugin holding
# `ipc.call` alone gets `CapabilityDenied` at the kernel entry, so
# `contributed_by` provenance and marketplace install records stay
# coherent with the contribution pipeline. Same gate applies to the
# LSP / MCP host / ACP equivalents below.
[[handler]]
plugin = "com.nexus.dap"
command = "register_adapter"
caps = ["protocol.host.contribute"]
note = "contribution lifecycle — invoked by bootstrap-side wiring at plugin load"

[[handler]]
plugin = "com.nexus.dap"
command = "unregister_adapter"
caps = ["protocol.host.contribute"]
note = "contribution lifecycle — invoked by bootstrap-side wiring at plugin disable"

