# AUDIT: drives arbitrary plugins via ipc_call (issue #77 laundering
# surface — workflow's own caps are pinned to ipc.call + minimal
# direct caps including `ai.chat`, so a caller with no `ai.chat`
# can reach `com.nexus.ai::ask` transitively via an `ai_prompt`
# step). The handler emits an audit-tagged `tracing::warn!` at
# run entry listing the workflow's implied caller-cap set (see
# `nexus_workflow::implied_caps::compute_implied_caps`) so the
# surface is observable even before kernel-level enforcement
# lands. Full fix requires making the `cap_policies` mechanism
# forge-root-aware so a policy closure can read the workflow file
# on dispatch. Tracked under #77 and BL-134 Phase 3.
[[handler]]
plugin = "com.nexus.workflow"
command = "run"
unrestricted = "executes a workflow on demand — implied caller-cap set is audit-logged via nexus_workflow::implied_caps (see issue #77)"

# AUDIT: same shape as run; cron-driven digest pipeline. The
# digest's implied caller-cap set is constant: `ai.chat` (the
# AI summarisation call). Audit-logged on every run.
[[handler]]
plugin = "com.nexus.workflow"
command = "run_digest"
unrestricted = "runs the digest pipeline on demand — fixed implied caller cap is `ai.chat`, audit-logged on every run (see issue #77)"

