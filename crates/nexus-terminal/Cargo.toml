[package]
name = "nexus-terminal"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Nexus terminal & process manager: PTY sessions, shell detection, output capture (PRD-09)"

[dependencies]
nexus-kernel = { path = "../nexus-kernel" }
nexus-plugins = { path = "../nexus-plugins" }
portable-pty = { workspace = true }
regex-lite = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
# SQLite persistence for sessions + ad-hoc command history (PRD-09 §2.2, §10.1).
rusqlite = { workspace = true }
ts-rs = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }

[features]
# Audit-2026-05-01 P1-3 (#113) — emit JSON Schema + TypeScript bindings
# for IPC arg/reply types. Off by default.
ts-export = ["dep:ts-rs", "dep:schemars"]

# libc is used only on Unix for signal(2) delivery. portable-pty's Child
# trait only exposes a force-kill (TerminateProcess / SIGKILL); the PRD-09
# §5 escalation ladder needs SIGINT and SIGTERM which we deliver via
# `libc::kill`. On Windows this crate is absent and the escalation path
# collapses to the force-kill fallback — see `session::Signal::send`.
[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

# Windows Job Objects (PRD-09 §5.3) — atomically terminate a process tree
# when the session is killed, since Windows has no POSIX process groups.
[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.60", features = [
    "Win32_Foundation",
    "Win32_System_JobObjects",
    "Win32_System_ProcessStatus",
    "Win32_System_Threading",
] }

[dev-dependencies]
tempfile = { workspace = true }
criterion = { version = "0.7", default-features = false, features = ["cargo_bench_support"] }

# PRD-09 §17 performance targets. Run with `cargo bench -p nexus-terminal`.
# Each bench is kept small enough to finish in under a minute so CI can
# run them on-demand without a full Criterion statistical suite.
[[bench]]
name = "buffers"
harness = false

[[bench]]
name = "lines"
harness = false
