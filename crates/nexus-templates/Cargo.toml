[package]
name        = "nexus-templates"
version.workspace   = true
edition.workspace   = true
license.workspace   = true
publish.workspace   = true
description = "Page-template subsystem: .template.md files with parameterized bodies and target-path patterns."

[dependencies]
thiserror  = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
serde_norway  = { workspace = true }
chrono     = { workspace = true }
tracing    = { workspace = true }
nexus-plugins = { path = "../nexus-plugins" }
ts-rs      = { workspace = true, optional = true, features = ["serde-json-impl"] }
schemars   = { workspace = true, optional = true }

[features]
ts-export = ["dep:ts-rs", "dep:schemars"]

[dev-dependencies]
tempfile = { workspace = true }
