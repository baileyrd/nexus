[package]
name = "nexus-types"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Shared types used by the Nexus kernel and plugins"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_norway = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
ts-rs = { workspace = true, optional = true, features = ["chrono-impl", "uuid-impl"] }
schemars = { workspace = true, optional = true }

[features]
default = []
# Emit TypeScript + JSON Schema bindings for activity-timeline types.
# Mirrors the `ts-export` feature on subsystem crates. Off by default;
# enable from the bootstrap drift script.
ts-export = ["dep:ts-rs", "dep:schemars"]

[dev-dependencies]
tempfile = { workspace = true }
