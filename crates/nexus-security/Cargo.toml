[package]
name = "nexus-security"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Nexus security: capability risk metadata, credential vault, audit logging, path validation"

[dependencies]
nexus-kernel = { path = "../nexus-kernel" }
nexus-plugins = { path = "../nexus-plugins" }
nexus-types = { path = "../nexus-types" }
tracing = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
keyring = { workspace = true }
# BL-102: TLS pinning for AI provider HTTP clients.
rustls = { workspace = true }
rustls-pki-types = { workspace = true }
webpki-roots = { workspace = true }
sha2 = { workspace = true }
# Outbound HTTPS client builder used by both nexus-ai and nexus-audio.
# Lives here so both subsystems share one pin policy.
reqwest = { workspace = true }
ts-rs = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }

[features]
# Emit JSON Schema + TypeScript bindings for the wire-mirror IPC types in
# `ipc.rs`. Off by default; enabled by `scripts/check_ipc_drift.sh`.
ts-export = ["dep:ts-rs", "dep:schemars"]

# OS process sandbox enforcement (Phase 4 F1). Landlock is Linux-only; other
# platforms get the no-op stub in `os_sandbox.rs`. macOS seatbelt / Windows
# restricted-token backends land later.
[target.'cfg(target_os = "linux")'.dependencies]
landlock = { workspace = true }
seccompiler = { workspace = true }
libc = { workspace = true }

# The OS-sandbox helper: a single-threaded sidecar that applies a SandboxPolicy
# to itself and execs the target command, avoiding the after-fork allocation
# hazard of a pre_exec hook. See crates/nexus-security/src/bin/nexus-sandbox.rs.
[[bin]]
name = "nexus-sandbox"
path = "src/bin/nexus-sandbox.rs"

[dev-dependencies]
tempfile = { workspace = true }
