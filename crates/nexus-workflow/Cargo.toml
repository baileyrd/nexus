[package]
name = "nexus-workflow"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Nexus workflow subsystem: .workflow.toml parser + typed model + registry (PRD-16 scaffold)"

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }
regex-lite = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
fastrand = "2"
futures = "0.3"
nexus-kernel = { path = "../nexus-kernel" }
nexus-plugins = { path = "../nexus-plugins" }
# BL-052 — universal activity timeline emitter types.
nexus-types = { path = "../nexus-types" }
ts-rs = { workspace = true, optional = true, features = ["serde-json-impl"] }
schemars = { workspace = true, optional = true }

[features]
# Audit-2026-05-01 P1-3 (#113) — emit JSON Schema + TypeScript bindings
# for IPC arg/reply types. Off by default. Only the Args side is
# wired in — Workflow / Trigger / Step etc. use
# `#[serde(flatten)] extra: BTreeMap<String, toml::Value>` which is
# incompatible with `deny_unknown_fields` (the P0-2 gate).
ts-export = ["dep:ts-rs", "dep:schemars"]

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full", "test-util"] }
