[theme]
name = "Dracula"
version = "1.0.0"
author = "Zeno Rocha (palette) · Nexus (port)"
description = "Dracula — vivid purple/pink dark theme"
license = "MIT"
nexus_min_version = "0.1.0"
nexus_max_version = "*"
display_name = "Dracula"
category = "dark"
supports = ["dark"]

[variables]
"--nx-color-primary" = "#bd93f9"
"--nx-color-primary-light" = "#d4b3ff"
"--nx-color-primary-dark" = "#9670d8"
"--nx-color-primary-soft" = "rgba(189, 147, 249, 0.16)"
"--nx-bg-primary" = "#282a36"
"--nx-bg-secondary" = "#21222c"
"--nx-bg-tertiary" = "#343746"
"--nx-bg-overlay" = "rgba(0, 0, 0, 0.65)"
"--nx-bg-elevated" = "#44475a"
"--nx-text-primary" = "#f8f8f2"
"--nx-text-secondary" = "#e0e0d8"
"--nx-text-tertiary" = "#a8a8a8"
"--nx-text-muted" = "#6272a4"
"--nx-text-inverted" = "#282a36"
"--nx-interactive-hover" = "rgba(98, 114, 164, 0.18)"
"--nx-interactive-active" = "rgba(98, 114, 164, 0.30)"
"--nx-border" = "rgba(248, 248, 242, 0.10)"
"--nx-syntax-keyword" = "#ff79c6"
"--nx-syntax-string" = "#f1fa8c"
"--nx-syntax-comment" = "#6272a4"
"--nx-syntax-number" = "#bd93f9"
"--nx-syntax-function" = "#50fa7b"
"--nx-shadow-sm" = "0 1px 2px rgba(0, 0, 0, 0.35)"
"--nx-shadow-md" = "0 4px 6px rgba(0, 0, 0, 0.45)"
"--nx-shadow-lg" = "0 10px 15px rgba(0, 0, 0, 0.55)"
"--nx-graph-grid" = "rgba(248, 248, 242, 0.05)"


"--nx-density-cozy-ui-size"               = "13px"
"--nx-density-cozy-row-h"                 = "26px"
"--nx-density-cozy-body-size"             = "16px"
"--nx-density-cozy-chrome-row-height"     = "36px"
"--nx-density-cozy-chrome-icon-size"      = "24px"
"--nx-density-compact-ui-size"            = "12px"
"--nx-density-compact-row-h"              = "22px"
"--nx-density-compact-body-size"          = "15px"
"--nx-density-compact-chrome-row-height"  = "30px"
"--nx-density-compact-chrome-icon-size"   = "20px"
"--nx-density-spacious-ui-size"           = "14px"
"--nx-density-spacious-row-h"             = "30px"
"--nx-density-spacious-body-size"         = "17px"
"--nx-density-spacious-chrome-row-height" = "40px"
"--nx-density-spacious-chrome-icon-size"  = "28px"

[tags]
keywords = ["dracula", "purple", "pink", "dark", "vivid"]
color_temperature = "warm"
contrast_level = "aa"
use_case = ["coding"]

[version_history]
"1.0.0" = "Initial release"
