[theme]
name = "Nexus Forge"
version = "1.0.0"
author = "Nexus"
description = "Ember-dark workspace theme — warm amber accent, IBM Plex Serif body, Inter UI"
license = "MIT OR Apache-2.0"
nexus_min_version = "0.1.0"
nexus_max_version = "*"
display_name = "Nexus Forge"
category = "dark"
supports = ["dark"]
platform_specific = ["macos", "windows"]

[variables]
"--nx-color-primary" = "#E6A24A"
"--nx-color-primary-light" = "#F2B968"
"--nx-color-primary-dark" = "#B37B2E"
"--nx-bg-primary" = "#1B1C22"
"--nx-bg-secondary" = "#222329"
"--nx-bg-tertiary" = "#2C2E36"
"--nx-bg-overlay" = "rgba(0, 0, 0, 0.55)"
"--nx-bg-elevated" = "#2A2B32"
"--nx-bg-soft" = "#27241E"
"--nx-text-primary" = "#EFEBE4"
"--nx-text-secondary" = "#C9C3B8"
"--nx-text-tertiary" = "#ACA69A"
"--nx-text-muted" = "#7F7A70"
"--nx-text-inverted" = "#2A1F0E"
"--nx-interactive-hover" = "rgba(230, 162, 74, 0.12)"
"--nx-interactive-active" = "rgba(230, 162, 74, 0.24)"
"--nx-accent-ember" = "#E6A24A"
"--nx-accent-ember-soft" = "rgba(230, 162, 74, 0.16)"
"--nx-accent-cool" = "#7FB4E6"
"--nx-status-ok" = "#7FCFA3"
"--nx-status-warn" = "#E8C26A"
"--nx-status-risk" = "#E0796B"
"--nx-syntax-keyword" = "#E6A24A"
"--nx-syntax-string" = "#A8D68C"
"--nx-syntax-comment" = "#7F7A70"
"--nx-syntax-number" = "#E8C26A"
"--nx-syntax-function" = "#7FB4E6"
"--nx-shadow-sm" = "0 1px 2px rgba(0, 0, 0, 0.35)"
"--nx-shadow-md" = "0 4px 10px rgba(0, 0, 0, 0.4)"
"--nx-shadow-lg" = "0 10px 30px rgba(0, 0, 0, 0.5)"
"--nx-graph-grid" = "rgba(239, 235, 228, 0.05)"

[typography]
sans_font = "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
serif_font = "'IBM Plex Serif', Georgia, serif"
mono_font = "'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace"

[platforms.macos]
"--nx-bg-elevated" = "rgba(42, 43, 50, 0.85)"

[platforms.windows]
"--nx-bg-secondary" = "rgba(34, 35, 41, 0.72)"

[tags]
keywords = ["forge", "ember", "amber", "warm", "dark", "editor"]
color_temperature = "warm"
contrast_level = "aa"
use_case = ["writing", "notes", "long-sessions", "editor"]

[version_history]
"1.0.0" = "Initial ember-dark Forge theme"
