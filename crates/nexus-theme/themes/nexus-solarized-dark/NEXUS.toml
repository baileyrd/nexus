[theme]
name = "Solarized Dark"
version = "1.0.0"
author = "Ethan Schoonover (palette) · Nexus (port)"
description = "Solarized Dark — low-contrast tones tuned for long sessions"
license = "MIT"
nexus_min_version = "0.1.0"
nexus_max_version = "*"
display_name = "Solarized Dark"
category = "dark"
supports = ["dark"]

[variables]
"--nx-color-primary" = "#268bd2"
"--nx-color-primary-light" = "#5fb3e7"
"--nx-color-primary-dark" = "#1f6f9f"
"--nx-color-primary-soft" = "rgba(38, 139, 210, 0.16)"
"--nx-bg-primary" = "#002b36"
"--nx-bg-secondary" = "#073642"
"--nx-bg-tertiary" = "#0a4453"
"--nx-bg-overlay" = "rgba(0, 0, 0, 0.65)"
"--nx-bg-elevated" = "#0e4c5c"
"--nx-text-primary" = "#fdf6e3"
"--nx-text-secondary" = "#eee8d5"
"--nx-text-tertiary" = "#93a1a1"
"--nx-text-muted" = "#586e75"
"--nx-text-inverted" = "#002b36"
"--nx-interactive-hover" = "rgba(147, 161, 161, 0.10)"
"--nx-interactive-active" = "rgba(147, 161, 161, 0.18)"
"--nx-border" = "rgba(147, 161, 161, 0.18)"
"--nx-syntax-keyword" = "#cb4b16"
"--nx-syntax-string" = "#859900"
"--nx-syntax-comment" = "#586e75"
"--nx-syntax-number" = "#d33682"
"--nx-syntax-function" = "#268bd2"
"--nx-shadow-sm" = "0 1px 2px rgba(0, 0, 0, 0.30)"
"--nx-shadow-md" = "0 4px 6px rgba(0, 0, 0, 0.40)"
"--nx-shadow-lg" = "0 10px 15px rgba(0, 0, 0, 0.50)"
"--nx-graph-grid" = "rgba(253, 246, 227, 0.05)"


"--nx-density-cozy-ui-size"               = "13px"
"--nx-density-cozy-row-h"                 = "26px"
"--nx-density-cozy-body-size"             = "16px"
"--nx-density-cozy-chrome-row-height"     = "36px"
"--nx-density-cozy-chrome-icon-size"      = "24px"
"--nx-density-compact-ui-size"            = "12px"
"--nx-density-compact-row-h"              = "22px"
"--nx-density-compact-body-size"          = "15px"
"--nx-density-compact-chrome-row-height"  = "30px"
"--nx-density-compact-chrome-icon-size"   = "20px"
"--nx-density-spacious-ui-size"           = "14px"
"--nx-density-spacious-row-h"             = "30px"
"--nx-density-spacious-body-size"         = "17px"
"--nx-density-spacious-chrome-row-height" = "40px"
"--nx-density-spacious-chrome-icon-size"  = "28px"

[tags]
keywords = ["solarized", "dark", "low-contrast", "classic"]
color_temperature = "cool"
contrast_level = "aa"
use_case = ["coding", "long-sessions"]

[version_history]
"1.0.0" = "Initial release"
