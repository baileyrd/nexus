# "Vibe Management" layout: AI-assisted project steering.
#
# Row-split centre with note/canvas on the left and AI chat on the right,
# task/base/project panels in the left sidebar, and a bottom tray for
# terminal + agent-log output.

id = "vibe"
name = "Vibe Management"
description = "Note/canvas + AI chat split, task and base panels left, agent log bottom."
focusedPaneId = "pane-vibe-note"

[root]
type = "split"
id = "split-vibe-root"
direction = "row"
sizes = [0.6, 0.4]

[[root.children]]
type = "leaf"
id = "pane-vibe-note"
tabs = []
collapsed = false

[[root.children]]
type = "leaf"
id = "pane-vibe-chat"
tabs = []
collapsed = false

[leftSidebar]
side = "left"
width = 260
collapsed = false
miniMode = false
panelOrder = ["tasks", "bases", "projects", "notes", "ai-history"]

[[leftSidebar.ribbon]]
id = "tasks"
icon = "check-square"
tooltip = "Tasks"
action = { kind = "togglePanel", panelId = "tasks" }

[[leftSidebar.ribbon]]
id = "bases"
icon = "database"
tooltip = "Bases"
action = { kind = "togglePanel", panelId = "bases" }

[[leftSidebar.ribbon]]
id = "projects"
icon = "briefcase"
tooltip = "Projects"
action = { kind = "togglePanel", panelId = "projects" }

[[leftSidebar.ribbon]]
id = "notes"
icon = "file-text"
tooltip = "Notes"
action = { kind = "togglePanel", panelId = "notes" }

[[leftSidebar.ribbon]]
id = "ai-history"
icon = "sparkles"
tooltip = "AI conversation history"
action = { kind = "togglePanel", panelId = "ai-history" }

[[leftSidebar.panels]]
id = "tasks"
title = "Tasks"
icon = "check-square"
visible = true

[[leftSidebar.panels]]
id = "bases"
title = "Bases"
icon = "database"
visible = false

[[leftSidebar.panels]]
id = "projects"
title = "Projects"
icon = "briefcase"
visible = false

[[leftSidebar.panels]]
id = "notes"
title = "Notes"
icon = "file-text"
visible = false

[[leftSidebar.panels]]
id = "ai-history"
title = "AI History"
icon = "sparkles"
visible = false

[rightSidebar]
side = "right"
width = 280
collapsed = true
miniMode = false
panels = []
panelOrder = []

[bottomPanel]
height = 200
collapsed = false
tabs = []
