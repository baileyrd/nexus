# "Vibe Management" layout: AI-assisted project steering.
#
# Row-split centre with note/canvas on the left and AI chat on the right,
# task/base/project panels in the left side panel, and a bottom tray for
# terminal + agent-log output.

id = "vibe"
name = "Vibe Management"
description = "Note/canvas + AI chat split, task and base panels left, agent log bottom."
focusedPaneId = "pane-vibe-note"

[root]
type = "split"
id = "split-vibe-root"
direction = "row"
sizes = [0.6, 0.4]

[[root.children]]
type = "leaf"
id = "pane-vibe-note"
tabs = []
collapsed = false

[[root.children]]
type = "leaf"
id = "pane-vibe-chat"
tabs = []
collapsed = false

# ── Workspace ribbon ────────────────────────────────────────────────────────
# AI / orchestration shortcuts.

[[ribbon]]
id = "ai-chat"
icon = "sparkles"
tooltip = "Open AI chat"
action = { kind = "openView", viewId = "ai-chat" }

[[ribbon]]
id = "agents"
icon = "bot"
tooltip = "Agents"
action = { kind = "openView", viewId = "agents" }

[[ribbon]]
id = "workflows"
icon = "workflow"
tooltip = "Workflows"
action = { kind = "openView", viewId = "workflows" }

[[ribbon]]
id = "terminal"
icon = "terminal"
tooltip = "Toggle terminal"
action = { kind = "invokeCommand", command = "workspace.toggle-terminal" }

[leftSidePanel]
side = "left"
width = 260
collapsed = false
miniMode = false
panelOrder = ["tasks", "bases", "projects", "notes", "ai-history"]

[[leftSidePanel.panels]]
id = "tasks"
title = "Tasks"
icon = "check-square"
visible = true

[[leftSidePanel.panels]]
id = "bases"
title = "Bases"
icon = "database"
visible = false

[[leftSidePanel.panels]]
id = "projects"
title = "Projects"
icon = "briefcase"
visible = false

[[leftSidePanel.panels]]
id = "notes"
title = "Notes"
icon = "file-text"
visible = false

[[leftSidePanel.panels]]
id = "ai-history"
title = "AI History"
icon = "sparkles"
visible = false

[rightSidePanel]
side = "right"
width = 280
collapsed = true
miniMode = false
panels = []
panelOrder = []

[bottomPanel]
height = 200
collapsed = false
tabs = []
