# Obsidian-style layout: single editor pane with both side panels open.
#
# The workspace ribbon (far-left vertical rail) carries plugin/view
# shortcuts (graph view, calendar, terminal, canvas, tasks). Each side
# panel has its own panel-selector toolbar derived from its panels list.

id = "obsidian"
name = "Obsidian"
description = "Single editor pane, ribbon left + selector toolbar on each side panel."
focusedPaneId = "pane-obsidian-main"

[root]
type = "leaf"
id = "pane-obsidian-main"
tabs = []
collapsed = false

# ── Workspace ribbon (far-left rail) ────────────────────────────────────────
# Plugin / view shortcuts. Resolved through the UI contribution registry —
# core ships these stubs; plugins can append more ids.

[[ribbon]]
id = "graph-view"
icon = "graph"
tooltip = "Graph view"
action = { kind = "openView", viewId = "graph" }

[[ribbon]]
id = "canvas"
icon = "layout-grid"
tooltip = "New canvas"
action = { kind = "invokeCommand", command = "canvas.new" }

[[ribbon]]
id = "calendar"
icon = "calendar"
tooltip = "Daily notes calendar"
action = { kind = "openView", viewId = "calendar" }

[[ribbon]]
id = "all-files"
icon = "files"
tooltip = "All files"
action = { kind = "openView", viewId = "all-files" }

[[ribbon]]
id = "terminal"
icon = "terminal"
tooltip = "Toggle terminal"
action = { kind = "invokeCommand", command = "workspace.toggle-terminal" }

[[ribbon]]
id = "tasks"
icon = "list-checks"
tooltip = "Tasks"
action = { kind = "openView", viewId = "tasks" }

# ── Left side panel ─────────────────────────────────────────────────────────
# Panel selector at the top is derived from the panels list. The active
# panel renders its own toolbar + content below.

[leftSidePanel]
side = "left"
width = 280
collapsed = false
miniMode = false
panelOrder = ["explorer", "search", "bookmarks", "tags", "graph"]

[[leftSidePanel.panels]]
id = "explorer"
title = "Files"
icon = "folder"
visible = false

[[leftSidePanel.panels]]
id = "search"
title = "Search"
icon = "search"
visible = false

[[leftSidePanel.panels]]
id = "bookmarks"
title = "Bookmarks"
icon = "bookmark"
visible = true
contentType = "bookmarks"
toolbar = [
  { id = "bookmarks.new", icon = "bookmark-plus", tooltip = "New bookmark", action = { kind = "invokeCommand", command = "bookmarks.new" } },
  { id = "bookmarks.new-folder", icon = "folder-plus", tooltip = "New bookmark folder", action = { kind = "invokeCommand", command = "bookmarks.new-folder" } },
  { id = "bookmarks.collapse-all", icon = "chevrons-up", tooltip = "Collapse all", action = { kind = "invokeCommand", command = "bookmarks.collapse-all" } },
]

[[leftSidePanel.panels]]
id = "tags"
title = "Tags"
icon = "tag"
visible = false

[[leftSidePanel.panels]]
id = "graph"
title = "Graph"
icon = "graph"
visible = false

# ── Right side panel ────────────────────────────────────────────────────────
# Contextual surfaces for the current note: backlinks, outgoing links,
# note-tags, and the active-note outline.

[rightSidePanel]
side = "right"
width = 300
collapsed = false
miniMode = false
panelOrder = ["backlinks", "outgoing-links", "tags-note", "outline"]

[[rightSidePanel.panels]]
id = "backlinks"
title = "Backlinks"
icon = "link-incoming"
visible = false

[[rightSidePanel.panels]]
id = "outgoing-links"
title = "Outgoing links"
icon = "link-outgoing"
visible = false

[[rightSidePanel.panels]]
id = "tags-note"
title = "Tags"
icon = "tag"
visible = false

[[rightSidePanel.panels]]
id = "outline"
title = "Outline"
icon = "list-indent"
visible = true
contentType = "outline"
toolbar = [
  { id = "outline.sort-direction", icon = "arrow-up", tooltip = "Sort direction", action = { kind = "invokeCommand", command = "outline.sort-direction" } },
  { id = "outline.view-tree", icon = "list-tree", tooltip = "Tree view", action = { kind = "invokeCommand", command = "outline.view-tree" } },
  { id = "outline.sort-field", icon = "chevrons-up-down", tooltip = "Sort field", action = { kind = "invokeCommand", command = "outline.sort-field" } },
  { id = "outline.search", icon = "search", tooltip = "Search headings", action = { kind = "invokeCommand", command = "outline.search" } },
]

[bottomPanel]
height = 200
collapsed = true
tabs = []
