# Dev Development layout: VS-Code-shaped IDE with a full bottom tray.
#
# Single editor pane, dev-tool shortcuts on the workspace ribbon, panel
# selectors at the top of the left side panel, no right side panel, and
# a tall bottom panel for terminal/problems/output tabs at runtime.

id = "dev"
name = "Dev"
description = "IDE-shaped: dev-tool ribbon, file/SCM/run panels, tall bottom terminal tray."
focusedPaneId = "pane-dev-editor"

[root]
type = "leaf"
id = "pane-dev-editor"
tabs = []
collapsed = false

# ── Workspace ribbon ────────────────────────────────────────────────────────
# Dev/IDE shortcuts. Most open dedicated views; toggle-terminal flips the
# bottom tray.

[[ribbon]]
id = "command-palette"
icon = "command"
tooltip = "Command palette"
action = { kind = "invokeCommand", command = "workspace.command-palette" }

[[ribbon]]
id = "git"
icon = "git-branch"
tooltip = "Git"
action = { kind = "openView", viewId = "git" }

[[ribbon]]
id = "run-debug"
icon = "play"
tooltip = "Run and Debug"
action = { kind = "openView", viewId = "run-debug" }

[[ribbon]]
id = "extensions"
icon = "puzzle"
tooltip = "Extensions"
action = { kind = "openView", viewId = "extensions" }

[[ribbon]]
id = "terminal"
icon = "terminal"
tooltip = "Toggle terminal"
action = { kind = "invokeCommand", command = "workspace.toggle-terminal" }

[leftSidePanel]
side = "left"
width = 260
collapsed = false
miniMode = false
panelOrder = ["explorer", "search", "source-control", "run-debug", "extensions"]

[[leftSidePanel.panels]]
id = "explorer"
title = "Explorer"
icon = "folder"
visible = true
contentType = "files"

[[leftSidePanel.panels]]
id = "search"
title = "Search"
icon = "search"
visible = false

[[leftSidePanel.panels]]
id = "source-control"
title = "Source Control"
icon = "git-branch"
visible = false

[[leftSidePanel.panels]]
id = "run-debug"
title = "Run and Debug"
icon = "play"
visible = false

[[leftSidePanel.panels]]
id = "extensions"
title = "Extensions"
icon = "puzzle"
visible = false

[rightSidePanel]
side = "right"
width = 280
collapsed = true
miniMode = false
panels = []
panelOrder = []

[bottomPanel]
height = 280
collapsed = false
tabs = []
