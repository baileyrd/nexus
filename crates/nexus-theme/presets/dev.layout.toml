# Dev Development layout: VS-Code-shaped IDE with a full bottom tray.
#
# Single editor pane, left activity ribbon covering the common dev surfaces
# (files/search/SCM/run/extensions), no right sidebar, and a tall bottom
# panel configured to host terminal/problems/output tabs at runtime.

id = "dev"
name = "Dev Development"
description = "IDE-shaped: explorer + SCM + run/debug ribbon, tall bottom terminal tray."
focusedPaneId = "pane-dev-editor"

[root]
type = "leaf"
id = "pane-dev-editor"
tabs = []
collapsed = false

[leftSidebar]
side = "left"
width = 260
collapsed = false
miniMode = false
panelOrder = ["explorer", "search", "source-control", "run-debug", "extensions"]

[[leftSidebar.ribbon]]
id = "explorer"
icon = "folder"
tooltip = "Explorer"
action = { kind = "togglePanel", panelId = "explorer" }

[[leftSidebar.ribbon]]
id = "search"
icon = "search"
tooltip = "Search"
action = { kind = "togglePanel", panelId = "search" }

[[leftSidebar.ribbon]]
id = "source-control"
icon = "git-branch"
tooltip = "Source Control"
action = { kind = "togglePanel", panelId = "source-control" }

[[leftSidebar.ribbon]]
id = "run-debug"
icon = "play"
tooltip = "Run and Debug"
action = { kind = "togglePanel", panelId = "run-debug" }

[[leftSidebar.ribbon]]
id = "extensions"
icon = "puzzle"
tooltip = "Extensions"
action = { kind = "togglePanel", panelId = "extensions" }

[[leftSidebar.panels]]
id = "explorer"
title = "Explorer"
icon = "folder"
visible = true

[[leftSidebar.panels]]
id = "search"
title = "Search"
icon = "search"
visible = false

[[leftSidebar.panels]]
id = "source-control"
title = "Source Control"
icon = "git-branch"
visible = false

[[leftSidebar.panels]]
id = "run-debug"
title = "Run and Debug"
icon = "play"
visible = false

[[leftSidebar.panels]]
id = "extensions"
title = "Extensions"
icon = "puzzle"
visible = false

[rightSidebar]
side = "right"
width = 280
collapsed = true
miniMode = false
panels = []
panelOrder = []

[bottomPanel]
height = 280
collapsed = false
tabs = []
