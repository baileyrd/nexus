[package]
name = "nexus-storage"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Nexus storage engine: forge layout, atomic writes, SQLite index, markdown parsing, file watching, Tantivy search"

[dependencies]
nexus-kernel = { path = "../nexus-kernel" }
nexus-plugins = { path = "../nexus-plugins" }
nexus-types = { path = "../nexus-types" }
nexus-database = { path = "../nexus-database" }
nexus-formats = { path = "../nexus-formats" }
# Phase 5.1 (RFC 0005) — hashline `edit` handler.
nexus-hashline = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yml = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }
rusqlite = { workspace = true }
r2d2 = { workspace = true }
r2d2_sqlite = { workspace = true }
tantivy = { workspace = true }
# BL-078 — multi-file find/replace uses regex_lite for the regex
# matcher and the whole-word boundary fallback. Same engine as the
# editor's Find / Replace dialog and the cross-session terminal
# search, so a query that works there works here.
regex-lite = { workspace = true }
comrak = { workspace = true }
toml = { workspace = true }
notify = { workspace = true }
notify-debouncer-mini = { workspace = true }
rayon = { workspace = true }
libc = { workspace = true }
fs4 = "1"
petgraph = { workspace = true }
chrono = { workspace = true }
# BL-083: forge-to-forge import hashes.
sha2 = { workspace = true }
# BL-114: tree-sitter code-symbol index. One runtime crate + one
# grammar per language in the BL-075 default code-extension set
# (Rust / TS+TSX / JS+JSX / Python / Go). Symbols are persisted to
# the same SQLite that backs the FTS index and rebuildable from
# files on disk, so the dep cost is gated behind a real load-bearing
# feature rather than purely cosmetic.
tree-sitter = { workspace = true }
tree-sitter-rust = { workspace = true }
tree-sitter-typescript = { workspace = true }
tree-sitter-python = { workspace = true }
tree-sitter-go = { workspace = true }
tree-sitter-javascript = { workspace = true }
ts-rs = { workspace = true, optional = true, features = ["chrono-impl", "uuid-impl"] }
schemars = { workspace = true, optional = true }

[features]
# Emit TypeScript + JSON Schema bindings for the Phase 4 WI-36 pilot IPC
# handler types. Off by default so normal Rust builds don't pull ts-rs or
# schemars. Enable with `cargo test -p nexus-storage --features ts-export`
# when regenerating bindings.
ts-export = ["dep:ts-rs", "dep:schemars"]

[dev-dependencies]
tempfile = { workspace = true }
filetime = { workspace = true }
