# cargo-deny configuration (V6, docs/0.1.2/audits/repo-review-2026-06-10.md).
#
# Supply-chain gate for the Rust workspace: security advisories, license
# policy, duplicate-version hygiene, and registry provenance. Runs on every
# PR via .github/workflows/ci.yml (cargo-deny job); run locally with
# `cargo deny check`.

[graph]
# The platforms Nexus actually ships on. Limiting the graph keeps the check
# from flagging advisories in target-gated deps we never compile.
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
]
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # serde_yml is unsound + unmaintained. Used for frontmatter handling in
    # six crates; the YAML-library migration is tracked in #248. Do not
    # remove this ignore without landing that migration.
    { id = "RUSTSEC-2025-0068", reason = "serde_yml replacement tracked in #248" },
    # paste is a build-time proc-macro (transitive via tokenizers); it ships
    # no runtime code and upstream archived it with no successor. Revisit if
    # the direct dependents migrate off it.
    { id = "RUSTSEC-2024-0436", reason = "unmaintained build-time proc-macro, no runtime code" },
]

[licenses]
# Everything in today's tree. All permissive (plus MPL-2.0, weak file-level
# copyleft — fine for unmodified library use). Adding a dep under a new
# license fails CI until the license is reviewed and listed here.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
    "zlib-acknowledgement",
]
confidence-threshold = 0.8

[bans]
# The tree currently carries many duplicate minor versions (transitive churn);
# warn rather than deny so this surfaces in logs without blocking PRs.
multiple-versions = "warn"
# Wildcard version requirements are banned, except the `path = "..."`
# workspace-internal deps which legitimately have no version.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
