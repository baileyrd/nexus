# R1 (#184) — the PR-gated test/lint/format enforcement that was absent.
#
# Before this workflow, `.github/workflows/` held only the IPC drift-check and
# the Windows release build; none of the ~4,200 Rust tests, clippy, rustfmt, or
# the pnpm typecheck/lint/test ran on PRs, so merges to `main` were gated on
# nothing. That is the root cause the expert review (R1) called out — it let
# the IPC-binding drift (R2) slip through.
#
# Scope split:
#   * IPC-schema drift           — ipc-drift-check.yml (already runs every PR
#                                  after the #194 follow-up broadened its trigger).
#   * everything else (here)     — fmt, clippy (warnings-as-errors), the Rust
#                                  test suite, and the shell + extension-api
#                                  TypeScript checks.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Cancel a PR's in-flight run when a new push supersedes it (`head_ref` is set
  # only for pull_request events). Push events fall back to the unique run_id, so
  # `main` builds are never cancelled by a later commit.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  rust-fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # No compile, no cache — formatting is a pure source-text check, so this
      # job gives near-instant feedback ahead of the slower clippy/test job.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  ipc-docs-drift:
    name: IPC docs drift (hand-maintained docs vs cap matrix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pure-text check, no toolchain. Found rotted within a day of the
      # 2026-06-10 review wiring it up (ai.runtime 9 → 12) — same V5
      # lesson as the boundary guard: an unenforced checker is decoration.
      - name: check_ipc_docs_drift.sh
        run: bash scripts/check_ipc_docs_drift.sh

  cargo-deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # V6 (repo-review-2026-06-10) — supply-chain gate. Policy lives in
      # deny.toml at the repo root; advisory ignores there carry tracking
      # issues (e.g. serde_yml → #248). The action ships a prebuilt binary,
      # so this job needs no Rust toolchain or cache and finishes fast.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  rust:
    name: clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # This job runs clippy --all-targets AND cargo test --workspace, whose
      # combined target/ exceeds the runner's default free disk — linking the
      # test binaries SIGBUS'd ("ld terminated with signal 7 [Bus error]").
      # Reclaim ~25 GB of preinstalled toolchains this job never touches.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      # git2 (vendored-libgit2) and rusqlite (bundled) build their C sources
      # in-tree, so the only system requirement is the C toolchain ubuntu-latest
      # already ships — no apt step needed.
      #
      # `-D warnings` makes rustc + default clippy lints (correctness, suspicious,
      # complexity, perf, style) hard errors. `--force-warn clippy::pedantic`
      # then pins the pedantic group back to a *warning*: every crate opts into
      # `#![warn(clippy::pedantic)]` deliberately (advisory, not blocking), and a
      # ~300-item pedantic backlog (missing_panics_doc, too_many_lines, casts, …)
      # is tracked separately rather than gating every PR on it. Drop the
      # force-warn once that backlog is drained to make pedantic blocking too.
      - name: cargo clippy (deny real warnings; pedantic stays advisory)
        run: cargo clippy --workspace --all-targets -- -D warnings --force-warn clippy::pedantic
      # Locks the #198 (R15) gain. `unwrap_used` is `restriction`-group
      # (allow-by-default), so `-D warnings` above doesn't cover it. The audit's
      # complaint was about *production* unwraps — `--lib --bins` skips tests,
      # where unwrap is idiomatic. PR #243 + #246 took the workspace count to 0;
      # this step prevents a regression. `-A warnings` keeps the gate
      # single-purpose so it can't double-fail on warnings already caught above.
      - name: cargo clippy --lib --bins (deny clippy::unwrap_used — lock #198)
        run: cargo clippy --workspace --lib --bins -- -A warnings -D clippy::unwrap_used
      - name: cargo test
        run: cargo test --workspace

  web:
    name: pnpm typecheck + lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      # The shell consumes @nexus/extension-api's built output, so build and
      # typecheck the package first, then lint/typecheck/test the shell itself.
      - name: Build @nexus/extension-api
        run: pnpm --filter @nexus/extension-api build
      - name: Typecheck @nexus/extension-api
        run: pnpm --filter @nexus/extension-api check
      - name: Lint shell
        run: pnpm --filter nexus-shell lint
      - name: Typecheck shell
        run: pnpm --filter nexus-shell typecheck
      - name: Test shell
        run: pnpm --filter nexus-shell test
