name: rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system deps + mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            mold clang

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Run scripts/test_all.sh
        env:
          # ubuntu-latest only has 7 GB RAM. Even with mold, rustc
          # itself OOMs while compiling tauri/webkit2gtk under any
          # concurrency. Skip nexus-app (the only crate pulling the
          # webview stack) on CI — its 15 unit tests don't exercise
          # the crates E2E+IPC contract tests already cover.
          CARGO_BUILD_JOBS: "1"
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
          NEXUS_SKIP_TAURI_CRATES: "1"
        run: bash scripts/test_all.sh
