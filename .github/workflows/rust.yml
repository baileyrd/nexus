name: rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system deps + mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            mold clang

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Monitor memory in background
        run: |
          (while true; do
            date -u +%H:%M:%S
            free -m | awk 'NR<=2'
            echo "---"
            sleep 15
          done) > /tmp/memlog.txt 2>&1 &
          echo $! > /tmp/memlog.pid

      - name: Run scripts/test_all.sh
        env:
          CARGO_BUILD_JOBS: "1"
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
          NEXUS_SKIP_TAURI_CRATES: "1"
        run: bash scripts/test_all.sh

      - name: Dump memory log (always)
        if: always()
        run: |
          kill "$(cat /tmp/memlog.pid)" 2>/dev/null || true
          tail -200 /tmp/memlog.txt || true
