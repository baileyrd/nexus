# Build the Windows installers for `nexus-shell` on a version tag.
#
# Tauri 2's `bundle.targets = "all"` produces both `.msi` (WiX) and `.exe`
# (NSIS) on Windows. Both are uploaded as workflow artifacts AND attached
# to a draft GitHub Release named after the tag, ready for manual review
# before publishing.
#
# `workflow_dispatch` is included so you can do a dry-run build off main
# without cutting a tag — the artifact upload still works, the Release
# step is skipped (no tag context).
name: Release Windows build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Tauri installers
    runs-on: windows-latest
    permissions:
      contents: write  # softprops/action-gh-release needs this to create the Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          # `shell/` is intentionally excluded from the root Cargo workspace
          # (see CLAUDE.md), so its target dir lives under shell/src-tauri/.
          workspaces: shell/src-tauri -> target

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows installers)
        run: pnpm --filter nexus-shell tauri:build

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-shell-windows-${{ github.ref_name }}
          path: |
            shell/src-tauri/target/release/bundle/msi/*.msi
            shell/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Attach installers to a draft Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            shell/src-tauri/target/release/bundle/msi/*.msi
            shell/src-tauri/target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: true
