# Phase 4 WI-36 — CI drift-check for regenerable IPC schemas.
#
# Regenerates:
#   * TS bindings  — `packages/nexus-extension-api/src/generated/**`
#   * JSON Schemas — `crates/nexus-bootstrap/schemas/ipc/*.json`
# …and fails if `git diff --exit-code` reports a diff. A PR that
# mutates a pilot IPC type without running `scripts/check_ipc_drift.sh`
# will fail here.
#
# This workflow is the first GitHub Actions job in the repo. When
# additional drift / lint workflows land they can share the same
# `setup` section — it's intentionally minimal.
name: IPC schema drift-check

on:
  # #194 / R2 follow-up: the hard-coded `paths:` filter let `IpcError::Cancelled`
  # land without regenerating its TS binding because the change was in
  # `nexus-plugin-api/src/error.rs` but plenty of *other* crates carry their
  # own `#[ts(export, ...)]` types. Running on every PR is the safe default;
  # `cargo test -p nexus-plugin-api --features ts-export` etc. are no-ops when
  # nothing changed.
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  drift:
    name: Regenerate + diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Run IPC drift-check
        run: bash scripts/check_ipc_drift.sh
