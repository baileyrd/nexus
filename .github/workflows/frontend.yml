name: frontend

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: app/ npm test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test
