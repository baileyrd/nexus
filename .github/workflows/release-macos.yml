# Build the macOS disk images for `nexus-shell` on a version tag.
#
# Builds both Apple-silicon (aarch64) and Intel (x86_64) `.dmg`s via a
# target matrix. Both are uploaded as workflow artifacts AND attached to
# the draft GitHub Release named after the tag (shared with the
# Windows/Linux release workflows — softprops/action-gh-release appends
# to an existing draft rather than duplicating it), ready for manual
# review before publishing.
#
# `workflow_dispatch` is included so you can do a dry-run build off main
# without cutting a tag — the artifact upload still works, the Release
# step is skipped (no tag context).
#
# Builds are UNSIGNED and UN-NOTARIZED (see RELEASE.md "Not yet in
# place"): Gatekeeper will quarantine downloads, so testers need
# `xattr -cr "Nexus Shell.app"` (or right-click → Open) until signing
# lands. A SHA256SUMS sidecar is generated so users can at least verify
# download integrity.
name: Release macOS build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    name: Build Tauri dmg (${{ matrix.target }})
    runs-on: macos-latest
    permissions:
      contents: write  # softprops/action-gh-release needs this to create the Release
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          # `shell/` is intentionally excluded from the root Cargo workspace
          # (see CLAUDE.md), so its target dir lives under shell/src-tauri/.
          workspaces: shell/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (macOS dmg)
        run: pnpm --filter nexus-shell tauri:build -- --target ${{ matrix.target }}

      - name: Generate SHA256SUMS
        run: |
          cd "shell/src-tauri/target/${{ matrix.target }}/release/bundle"
          shasum -a 256 dmg/*.dmg \
            > "SHA256SUMS-macos-${{ matrix.target }}-${{ github.ref_name }}.txt"
          cat "SHA256SUMS-macos-${{ matrix.target }}-${{ github.ref_name }}.txt"

      - name: Upload dmg as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-shell-macos-${{ matrix.target }}-${{ github.ref_name }}
          path: |
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/SHA256SUMS-macos-*.txt
          if-no-files-found: error

      - name: Attach dmg to a draft Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            shell/src-tauri/target/${{ matrix.target }}/release/bundle/SHA256SUMS-macos-*.txt
          fail_on_unmatched_files: true
